l_simp_chinese:


 ### 一、理念（Ideas）Localisation（完整30个）

 # 基础部族类（1-10）
 NAT_Flame_Tribe_Unity:"火焰部族团结"
 NAT_Flame_Tribe_Unity_desc:"纳塔的土地上，火焰部族曾因世代细碎纷争散落如星火，直至玛薇卡的意志如炬火照亮这片燃烧的大地。当各部族放下隔阂，火纹长矛并肩而立，散落星火便汇聚成燎原烈焰。赤红天幕下，勇士们以火焰起誓，血脉中火元素共鸣交织成坚不可摧的纽带，每一声战吼震颤大地，每一次并肩都让纳塔根基愈发稳固。这份团结是对抗纷扰的坚盾，是凝聚力量的核心，让纳塔的火焰不再是孤火，而是席卷提瓦特的炽烈洪流，守护着每一寸燃烧的故土，让部族的意志如火山岩浆般，奔涌不息。"

 NAT_Ash_Tribe_Reconciliation:"灰烬部族和解"
 NAT_Ash_Tribe_Reconciliation_desc:"灰烬部族曾是纳塔沉默的行者，见证过火焰的盛极与寂灭，也因过往误解与火焰部族渐行渐远。当玛薇卡的使者带着燃烧的橄榄枝抵达灰烬营地，尘封过往如灰烬被温柔拂去——资源与领地的争端，在火之神意志前皆成过往。和解钟声在火山谷地回荡，灰烬匠人以余温火山灰锻造铠甲，火焰战士以燎原之火温暖灰烬营地，两种力量如火焰与余烬相生相成。这份和解消解了内战疲惫，让纳塔外交纽带愈发柔软，稳定如火山岩般坚实，每一次握手都为燃烧之地增添一分安宁。"

 NAT_Tribe_Alliance_Strength:"部族同盟强化"
 NAT_Tribe_Alliance_Strength_desc:"纳塔的部族同盟本是散落火山与丛林的松散盟约，直至玛薇卡为其注入火之神意志。同盟议事厅中，各部族酋长以火焰纹章为契，将利益与纳塔未来紧紧绑定：火焰部族提供骁勇战士，灰烬部族献上精湛锻造技艺，烬火部族以工业之力支撑运转。这份强化的同盟，让纳塔在提瓦特外交舞台拥有沉甸甸的分量，同盟凝聚力如火山岩浆般炽热，每一次协同都让政治力量如火焰攀升，让纳塔的声音清晰传到璃月港口、蒙德风起地，乃至提瓦特每一个角落。"

 NAT_Tribal_Council_Authority:"部族议会权威"
 NAT_Tribal_Council_Authority_desc:"纳塔的部族议会诞生于火焰与灰烬的和解，最初仅是各部族交换意见的临时集会，直至玛薇卡为其赋予神圣权威。议会石座以火山岩雕琢，刻满火元素古老符文，每一位议员皆由部族公选，代表不同族群意志。议会决议如火山喷发般不容置疑，从资源分配到战事决断，从法典修订到外交走向，皆由其定夺。这份权威让纳塔治理如火焰般有序，稳定根基深入火山岩层，政治力量如岩浆奔涌，让每一个纳塔子民都知晓，议会的意志，便是燃烧之地的意志。"

 NAT_Flame_Festival_Spirit:"火焰庆典精神"
 NAT_Flame_Festival_Spirit_desc:"火焰庆典是纳塔最盛大的节日，源于对火之神的敬仰，也源于部族对生命的热忱。每至庆典，火山谷地燃起数千堆篝火，火焰部族舞者踩着岩浆节奏起舞，灰烬部族诗人吟唱古老战歌，玛薇卡亲临以火焰祝福沐浴每一位子民。庆典的精神是自由、热烈、永不熄灭的希望——它让战士忘却战争疲惫，让平民感受部族温暖，让民族主义火焰在心中燃烧。这份精神化作战争支持的不竭动力，化作幸福的源泉，让纳塔即便身处纷争，也始终保有如火般炽热的灵魂。"

 NAT_Cinder_Industry_Integration:"烬火工业整合"
 NAT_Cinder_Industry_Integration_desc:"烬火部族是纳塔的工业核心，世代以火山热能锻造冶炼，却因技术分散难以发挥全部力量。当玛薇卡推动工业整合，散落锻造坊被统一规划，火山热能被集中利用，古老锻造技艺与提瓦特工业理念相融——火焰附魔钢材从整合工厂源源不断产出，民用工厂烟囱如林矗立火山脚下，工业产能如岩浆奔涌。这份整合让纳塔工业不再是零散火花，而是支撑部族运转的炽烈熔炉，钢铁产量节节攀升，民用工业的繁荣也让纳塔经济如火焰般蒸蒸日上。"

 NAT_Tribal_Military_Heritage:"部族军事传承"
 NAT_Tribal_Military_Heritage_desc:"纳塔每一个部族都有专属军事传承：火焰部族擅长大规模冲锋，火元素长矛撕开敌人防线；灰烬部族精于防御伏击，火山岩工事坚不可摧；烬火部族锻造最锋利的武器、最坚固的铠甲。这份传承是先祖在无数战斗中沉淀的智慧，由老兵口传心授，由年轻战士亲身践行。玛薇卡将传承整合，让纳塔军队既有火焰的凌厉攻势，又有灰烬的坚韧防御，征兵速度如火焰蔓延般迅速，每一位战士都带着部族荣耀出征，让纳塔军队成为提瓦特不可小觑的火焰之师。"

 NAT_Border_Dispute_Resolution:"边境争端平息"
 NAT_Border_Dispute_Resolution_desc:"纳塔边境曾因火山地貌变迁、资源争夺，与周边部族屡屡争端，战火余温让土地寸草不生。玛薇卡以决斗为契亲自调停：定下公平规则，让争端双方以荣誉决斗代替血腥厮杀，胜者获应有权益，败者亦保部族尊严。争端平息的那一刻，边境火山停止躁动，火焰部族哨兵与邻族守卫相视一笑，过往敌意如灰烬消散。这份和平让纳塔稳定攀上顶峰，战争疲惫被温柔抚平，外交纽带也因和解愈发牢固，边境的火焰从此只象征温暖，而非纷争。"

 NAT_Flame_Chieftain_Leadership:"火焰酋长领导力"
 NAT_Flame_Chieftain_Leadership_desc:"火焰酋长是纳塔部族的灵魂，血脉中流淌最纯粹的火元素力量，意志便是部族的方向。在玛薇卡指引下，新一代酋长不再是独断的统治者，而是凝聚部族、倾听民意的领袖——他们站在火山之巅宣告决策，走进平民营地了解需求，在战场上身先士卒，以火焰勇气感染每一位战士。这份领导力让纳塔政治力量如火山喷发般强劲，政府权威深入每一个角落，民族主义火焰因酋长引领愈发炽烈，让纳塔的每一步前行，都有清晰而坚定的方向。"

 NAT_Tribal_Code_Order:"部族法典秩序"
 NAT_Tribal_Code_Order_desc:"纳塔的部族法典刻在火山岩巨碑之上，由各部族共同拟定、玛薇卡亲自见证，取代了过往混乱的部族惯例，为燃烧之地带来有序光芒。法典中既有决斗的公平规则，也有资源分配准则；既有对勇士的嘉奖条例，也有对作恶者的惩戒规定。每一条法典如火焰纹路般清晰，每一次执行如火山裁决般公正。这份秩序让纳塔稳定如磐石坚固，威权支持度节节攀升，法律效率如火焰般迅捷，让每一个纳塔子民都知晓，在法典庇护下，燃烧之地的未来必将如火焰般有序而炽热。"

 # 炉心守护类（11-20）
 NAT_Furnace_Heart_Guard:"炉心守卫部署"
 NAT_Furnace_Heart_Guard_desc:"炉心是纳塔的命脉，火之神力量的源泉，燃烧之地的能量核心，深藏火山腹地，流淌着滚烫岩浆与纯粹火元素之力。为守护这至宝，玛薇卡亲自组建炉心守卫——由纳塔最骁勇的战士组成，身披灰烬部族锻造的防火铠甲，手持火焰附魔长矛，日夜驻守炉心四周。守卫的部署让炉心防御如铜墙铁壁，要塞等级层层提升，驻军效率因专业训练大幅提高。每一位守卫都以生命起誓，哪怕流尽最后一滴血，也要让炉心的火焰永远燃烧在纳塔的土地上，守护这份火之神的馈赠。"

 NAT_Furnace_Heart_Barrier:"炉心屏障加固"
 NAT_Furnace_Heart_Barrier_desc:"炉心的屏障本是自然形成的火山岩壁，却因岁月侵蚀与外来觊觎日渐脆弱。玛薇卡下令加固这道屏障：烬火匠人以火山灰混合火元素结晶浇筑新岩层，火焰法师以火元素之力为屏障附上炽热护盾，工程队日夜赶工，基础设施如藤蔓缠绕屏障四周，加固速度如火焰蔓延。加固后的屏障如火山般坚不可摧，基础设施完善让炉心能量更好传导，工业效率因稳定能量供应大幅提升，让炉心成为纳塔最安全、也最具活力的核心。"

 NAT_Furnace_Heart_Charge:"炉心能量充能"
 NAT_Furnace_Heart_Charge_desc:"炉心的能量是纳塔工业、军事与民生的根基，当能量渐缓，玛薇卡便亲自主持充能仪式：以火之神权能引导提瓦特火元素汇聚炉心，部族法师吟唱古老咒语，烬火工厂以特殊装置辅助能量吸收。充能时火山谷地亮起赤红光芒，岩浆流速陡然加快，炉心能量如奔涌洪流般充盈。这份充能让军工工厂产能翻倍，步兵装备生产如星火涌现，工业产能因充沛能量节节攀升，让纳塔每一个角落都能感受到炉心炽热的馈赠，驱动着燃烧之地不断前行。"

 NAT_Furnace_Heart_Monitor:"炉心能量监控"
 NAT_Furnace_Heart_Monitor_desc:"炉心能量瞬息万变，一丝失衡便可能引发火山躁动，威胁纳塔安全。玛薇卡召集纳塔最聪慧的学者与法师，建立炉心能量监控体系：以火元素水晶为媒介实时监测能量波动，以精密仪器记录岩浆流速与温度，以情报机构力量防范外来窥探与破坏。监控体系的运转让情报机构效率大幅提升，间谍活动成功率节节攀升，政治力量也因炉心稳定愈发稳固，让纳塔能提前预判风险，守护住这燃烧之地的命脉，不让火之神的馈赠陷入危机。"

 NAT_Mavuika_s_Will:"玛薇卡的意志"
 NAT_Mavuika_s_Will_desc:"玛薇卡，纳塔的火之神，她的意志便是燃烧之地的方向，每一个决断都如火焰般炽热而坚定。当她宣告守护纳塔每一寸土地，部族战士便义无反顾奔赴战场；当她倡导部族和解，过往纷争便如灰烬消散；当她推动工业发展，炉心能量便倾囊相助。她的意志是纳塔政治力量的核心，是政府权威的源泉，是战争支持的不竭动力——每一个纳塔子民都坚信，追随玛薇卡的意志，便如追随不灭的火焰，无论面对何种困境，纳塔都能如火山般爆发出撼动提瓦特的力量。"

 NAT_Mavuika_s_Duel_Art:"玛薇卡的决斗艺术"
 NAT_Mavuika_s_Duel_Art_desc:"玛薇卡的决斗艺术是提瓦特最炽烈也最优雅的战斗方式，非单纯力量碰撞，而是火元素之力与战斗智慧的完美交融。她每一次出枪如火山喷发般凌厉，每一次闪避如火焰流动般灵动，将火元素韵律融入决斗每一个动作，让决斗成为一场燃烧的舞蹈。这份艺术被纳塔战士学习传承，让军队攻势如火焰般无坚不摧，突破防线的能力节节攀升，军队经验在练习与实战中快速积累。在玛薇卡的决斗艺术面前，任何敌人都将被炽烈火焰吞噬，化作灰烬。"

 NAT_Mavuika_s_Flame_Blessing:"玛薇卡的火焰祝福"
 NAT_Mavuika_s_Flame_Blessing_desc:"玛薇卡的火焰祝福是纳塔最珍贵的馈赠，她以火之神权能，将纯粹火元素之力注入纳塔的土地、工厂与战士之中。接受祝福的军工工厂，锻造的装备会附上火焰纹路，威力倍增；接受祝福的装甲生产线，效率如火焰般飙升；接受祝福的工业体系，每一个齿轮都因火元素加持运转得更顺畅。这份祝福是纳塔工业的核心动力，是军事装备的品质保障，是工业效率的提升密钥，让纳塔每一件产品都带着火之神的温度，每一个工厂都能迸发如火山般的产能。"

 NAT_Teyvat_Flame_Diplomacy:"提瓦特火焰外交"
 NAT_Teyvat_Flame_Diplomacy_desc:"纳塔的火焰外交如玛薇卡的性格般炽热而真诚，摒弃虚伪算计，以火焰的纯粹与提瓦特各国相交。纳塔外交使团带着火焰附魔工艺品前往璃月，与岩之国商人共商贸易；带着火焰酒前往蒙德，与风之国骑士举杯同饮；带着独特锻造技艺前往须弥，与草之国学者交流智慧。这份外交让纳塔在提瓦特的影响力节节攀升，与各国的关系如火焰般升温，贸易效率因友好氛围大幅提高，让纳塔的火焰温暖提瓦特每一个角落，缔结无隙的友谊。"

 NAT_Flame_Sports_Competition:"火焰体育竞技"
 NAT_Flame_Sports_Competition_desc:"火焰体育竞技是纳塔独有的盛会，非单纯娱乐，而是对战士体魄、意志与火元素掌控力的考验。竞技项目包罗万象：火焰长矛投掷、火山谷地竞速、火元素加持的摔跤，甚至模拟决斗的对抗赛。玛薇卡会亲自为胜者加冕，赠予火焰纹章勋章。这份竞技让纳塔子民忘却生活烦恼，幸福感如火焰般升腾，战争支持度因全民昂扬斗志而提高，民族主义火焰在每一次呐喊与欢呼中愈发炽烈。竞技场上的每一滴汗水，都浇灌着纳塔的荣耀。"

 NAT_Duel_Code_Establishment:"决斗法典确立"
 NAT_Duel_Code_Establishment_desc:"决斗是纳塔的传统，是解决争端、彰显荣誉的方式，却曾因无章可循屡屡引发不必要伤亡。玛薇卡召集部族智者，拟定详尽的决斗法典：规定决斗的场地、规则、裁判资质，明确胜者权益与败者尊严，细化禁止卑劣手段的条例。法典确立的那一刻，纳塔的决斗不再是混乱厮杀，而是充满仪式感与公平性的荣誉之争。这份法典让纳塔稳定如磐石坚固，政府权威因公正规则而提升，军队攻势因战士在法典下的训练，变得更加精准而凌厉。"

 # 进阶/终极类（21-30）
 NAT_Duel_Arena_Boost:"决斗竞技场加持"
 NAT_Duel_Arena_Boost_desc:"决斗竞技场是纳塔荣耀的象征，矗立在火山谷地中心，以火山岩为基，以火元素水晶为饰，是每一位纳塔战士渴望证明自己的舞台。玛薇卡为竞技场赋予火之神的加持：地面涌动温和的火元素之力，滋养参赛者体魄；锻造坊能以更快速度修复装备；周边民用工厂因竞技场带来的人流与活力，产能大幅提升。这份加持让竞技场建设速度如火焰般迅猛，民用工厂的繁荣带动民生发展，子民幸福感因这盛大的竞技之地，如火山喷发般高涨。"

 NAT_Duel_Champion_Glory:"决斗冠军荣耀"
 NAT_Duel_Champion_Glory_desc:"决斗冠军是纳塔最高的荣耀，唯有在竞技场战胜所有对手，历经火元素考验、意志磨砺，方能摘得这顶桂冠。玛薇卡会亲自为冠军戴上火焰羽毛与火山晶石打造的冠冕，将自己的佩剑赠予对方，整个纳塔都会为冠军欢呼，火山焰火彻夜绽放。这份荣耀让冠军所率军队攻势如火焰般凌厉，突破防线的能力达到顶峰，军队经验因冠军引领快速积累。每一位决斗冠军都是纳塔的英雄，名字会刻在竞技场石壁上，与纳塔火焰一同不朽。"

 NAT_Flame_Enchantment_Craft:"火焰附魔工艺"
 NAT_Flame_Enchantment_Craft_desc:"火焰附魔工艺是纳塔独有的锻造技艺，由烬火部族匠人世代传承，经玛薇卡火之神权能改良后愈发精妙。这份工艺能将纯粹火元素之力注入武器装备：附魔长矛燃起不灭火焰，附魔铠甲抵御严寒与冲击，附魔火炮发射燃烧炮弹。工艺的研发普及，让纳塔装备品质如火山晶石般卓越，军队攻势因精良装备愈发强劲，军工工厂产能因附魔工艺标准化大幅提升。每一件附魔装备，都是纳塔火焰力量的具象化。"

 NAT_Inferno_Shield_Technology:"炼狱护盾技术"
 NAT_Inferno_Shield_Technology_desc:"炼狱护盾技术是纳塔军工研发的巅峰之作，融合灰烬部族的防御智慧、烬火部族的工业力量与玛薇卡的火元素权能。这份技术打造的护盾，不仅能抵御物理攻击，还能以炽烈火焰灼烧靠近的敌人，护盾材质以火山核心熔岩晶石为原料，坚不可摧。技术突破让纳塔军队防御如炼狱般牢不可破，装甲防护力节节攀升，要塞防御能力因护盾技术应用达到前所未有的高度。在炼狱护盾面前，任何进攻都如扑向火焰的飞蛾，无功而返。"

 NAT_Fire_Element_Core_Research:"火元素核心研究"
 NAT_Fire_Element_Core_Research_desc:"火元素核心研究是纳塔对提瓦特元素法则的深度探索，由玛薇卡主导，汇聚须弥学者、璃月工匠与纳塔法师共同推进。研究目标是解析火元素最本源的力量，掌握其流动、聚合、爆发的规律，甚至探索火元素与核能源的交融可能。研究突破让纳塔科研速度如火焰般迅猛，核研究进程大幅加快，实验室效率因全新研究方法提升。这份研究是纳塔未来的希望，让燃烧之地不仅拥有炽热火焰，更拥有引领提瓦特的科技力量。"

 NAT_Furnace_Heart_Ultimate_Ascension:"炉心终极升华"
 NAT_Furnace_Heart_Ultimate_Ascension_desc:"炉心的终极升华，是玛薇卡以火之神全部权能为纳塔命脉做的终极蜕变。升华过程中，炉心岩浆与提瓦特火元素本源相连，火山谷地天空被赤红光芒笼罩，整个纳塔都能感受到磅礴能量。升华后的炉心，发电量如火山喷发般暴涨，工业效率达到前所未有的高度，民用工厂产能因充沛能量供应翻了数倍。这份升华让炉心成为提瓦特最强大的能量核心，也让纳塔的工业与民生，站在提瓦特的顶峰，绽放出最耀眼的火焰光芒。"

 NAT_Eternal_Flame_Army:"永恒火焰军团"
 NAT_Eternal_Flame_Army_desc:"永恒火焰军团是纳塔最精锐的军队，由玛薇卡亲自组建，每一位士兵都接受火元素洗礼，血脉中流淌不灭的火焰之力。军团征兵速度如火焰蔓延般迅速，兵员数量如火山岩浆般充沛，军队规模因源源不断的补充愈发壮大。他们身披炼狱护盾，手持火焰附魔武器，遵循玛薇卡的决斗艺术，战无不胜。这份军团是纳塔的钢铁洪流，是燃烧之地的守护者，他们的火焰将永远燃烧在提瓦特战场上，永不熄灭，守护着纳塔的每一寸土地。"

 NAT_Teyvat_Flame_Supremacy:"提瓦特火焰至上"
 NAT_Teyvat_Flame_Supremacy_desc:"提瓦特火焰至上，是纳塔历经部族凝聚、炉心守护、军事强化后，在提瓦特树立的绝对地位。纳塔的文化如火焰般席卷整个提瓦特，各国子民都向往燃烧之地的自由与热烈；纳塔的外交权重如火山般沉重，每一个决策都能影响提瓦特格局；纳塔的民族主义如炽烈火焰，每一个子民都以身为纳塔人而骄傲。这份至上地位，让纳塔不再是偏居一隅的燃烧之地，而是能引领提瓦特的火焰之国，玛薇卡的意志也因这份地位，成为提瓦特不可忽视的力量。"

 NAT_Flame_Armor_Research:"火焰装甲研发"
 NAT_Flame_Armor_Research_desc:"火焰装甲研发是纳塔军工的又一巅峰之作，将火焰附魔工艺与炼狱护盾技术完美融合，打造出兼具进攻与防御的装甲部队。研发出的装甲不仅能以高速冲锋撕裂敌人防线，还能释放火元素冲击波，灼烧大范围敌人，装甲防御能力足以抵御最猛烈的炮火。研发突破让纳塔装甲攻势如火山喷发般凌厉，防御能力如灰烬般坚韧，军工工厂产能因装甲技术标准化大幅提升。每一辆火焰装甲，都是纳塔军事力量的象征，是燃烧之地的钢铁雄狮。"

 NAT_Glory_Of_The_Burning_Land:"燃烧之地的荣耀"
 NAT_Glory_Of_The_Burning_Land_desc:"燃烧之地的荣耀，是纳塔历经无数磨砺后抵达的终极境界。此时的纳塔，部族团结如磐石，炉心能量如奔涌洪流，军队骁勇如烈火，外交地位如日中天。子民的幸福感达到顶峰，稳定根基深入火山核心，战争支持度如炽烈火焰般燃烧，民用与军工工厂产能皆处于提瓦特顶端，军队攻势无坚不摧。这份荣耀是玛薇卡与所有纳塔子民共同铸就的，它让纳塔的名字响彻提瓦特每一个角落，让燃烧之地的火焰成为提瓦特最耀眼的光芒，也让每一个纳塔人都能昂首挺胸，宣告自己来自这片充满荣耀的燃烧之地。"


 ### 二、国策（Focus Tree）Localisation（完整80个）

 # 阶段1：部族凝聚（1-10）
 NAT_Unite_The_Flame_Tribes:"统一火焰部族"
 NAT_Unite_The_Flame_Tribes_desc:"散落的星火唯有汇聚，方能成燎原之势。推动火焰部族放下世代隔阂，以玛薇卡之名缔结血火盟约，让燃烧之地的子民并肩而立，凝聚成不可撼动的整体。此举将大幅提升部族的政治力量与战争意志，让纳塔的火焰，首次以统一的姿态，照亮火山谷地的每一寸土地，为后续发展奠定坚实根基。"

 NAT_Reconcile_The_Ash_Tribe:"和解灰烬部族"
 NAT_Reconcile_The_Ash_Tribe_desc:"灰烬并非火焰的终结，而是新生的开端。向灰烬部族伸出和解之手，以火之神的名义抚平过往的裂痕，让灰烬的锻造技艺与火焰的骁勇相融，为纳塔增添一份沉稳的力量。和解将消解内战的疲惫，稳固部族的根基，让燃烧之地的火焰与灰烬共生共荣，共同抵御外来威胁。"

 NAT_Strengthen_Tribe_Alliances:"强化部族同盟"
 NAT_Strengthen_Tribe_Alliances_desc:"松散的盟约难以支撑长久发展，唯有强化部族同盟，才能让纳塔在提瓦特站稳脚跟。通过制定共同的利益规则、共享资源与技术，让各部族在同盟中找到归属感与安全感。此举将提升纳塔的外交权重与同盟凝聚力，让部族间的协作更加顺畅，政治力量也随之稳步提升。"

 NAT_Establish_Tribal_Council:"建立部族议会"
 NAT_Establish_Tribal_Council:"建立部族议会"
 NAT_Establish_Tribal_Council_desc:"无规矩不成方圆，建立部族议会是纳塔走向有序治理的关键一步。由各部族公选代表组成的议会，将集中处理部族事务、调解争端、规划发展方向，强化中央权威。这一举措将提升威权治理的支持度，为纳塔带来稳定的政治环境与充沛的政治力量，让治理效率大幅提升。"

 NAT_Flame_Tribe_Festival:"火焰部族庆典"
 NAT_Flame_Tribe_Festival_desc:"庆典是凝聚民心的纽带，火焰部族庆典将点燃每一位纳塔子民的热情。在火山谷地举办盛大的篝火晚会、决斗表演与祭祀仪式，让玛薇卡的祝福笼罩整个部族。庆典将大幅提升战争支持度与全民幸福感，让民族主义情怀在欢声笑语中悄然升温，加固部族的精神纽带。"

 NAT_Integrate_The_Cinder_Tribe:"整合烬火部族"
 NAT_Integrate_The_Cinder_Tribe_desc:"烬火部族的工业力量是纳塔崛起的核心引擎，整合其分散的锻造坊与冶炼技术，将火山热能集中利用，实现工业规模化发展。此举将为纳塔带来丰厚的钢铁资源与工业产能加成，民用工厂的扩建也将让经济活力持续释放，为军事与民生发展提供坚实保障。"

 NAT_Tribal_Military_Training:"部族军事训练"
 NAT_Tribal_Military_Training_desc:"强大的军队是部族生存的保障，整合各部族的军事传承，推行标准化军事训练，让火焰的凌厉、灰烬的坚韧完美融合。通过实战化演练与老兵传帮带，提升军队整体作战经验与进攻能力，加快征兵速度，让纳塔军队成为一支令人生畏的火焰之师。"

 NAT_Resolve_Tribal_Border_Disputes:"解决部族边境争端"
 NAT_Resolve_Tribal_Border_Disputes_desc:"边境争端是消耗部族元气的根源，以玛薇卡倡导的决斗规则为基础，调停各部族间的领土与资源纷争，用荣誉决斗代替血腥厮杀。争端的平息将大幅提升纳塔的稳定性，减少战争疲惫，让部族间的关系更加和睦，为对外发展扫清内部障碍。"

 NAT_Flame_Chieftains_Gathering:"火焰酋长集会"
 NAT_Flame_Chieftains_Gathering_desc:"召集所有火焰部族的酋长齐聚火山圣殿，共商纳塔发展大计，以玛薇卡的意志为核心，统一部族目标与行动方向。集会将巩固政治权力，强化政府权威，让各部族酋长成为纳塔崛起的中坚力量，推动部族向更高层次的团结迈进。"

 NAT_Adopt_Tribal_Legal_Code:"采纳部族法典"
 NAT_Adopt_Tribal_Legal_Code_desc:"将各部族的传统惯例整理编纂，形成统一的部族法典，明确权利与义务、奖惩与规则，让纳塔的治理有法可依。法典的采纳将大幅提升国家稳定性，强化威权统治的合法性，为纳塔的长治久安提供坚实的法律保障，同时带来少量政治力量加成。"

 # 阶段2：炉心守护（11-20）
 NAT_Guard_The_Furnace_Heart:"守护炉心"
 NAT_Guard_The_Furnace_Heart_desc:"炉心是纳塔的命脉，是火之神力量的源泉，必须派遣最精锐的战士驻守。在炉心周边修建坚固的防御工事，组建专属守卫部队，提升要塞等级与防御能力，确保炉心不被外敌觊觎与破坏。这一举措将为纳塔的工业与军事发展，守住能量核心与精神象征。"

 NAT_Repair_Furnace_Heart_Barriers:"修复炉心屏障"
 NAT_Repair_Furnace_Heart_Barriers_desc:"岁月侵蚀让炉心的天然屏障日渐脆弱，修复并强化这道屏障刻不容缓。组织工程队与火焰法师，以火山灰与火元素结晶加固岩壁，提升基础设施水平，加快建设速度。修复后的屏障将为炉心提供双重保护，同时提升工业效率，让炉心的能量更好地服务于纳塔发展。"

 NAT_Charge_The_Furnace_Heart:"充能炉心"
 NAT_Charge_The_Furnace_Heart_desc:"炉心的能量是纳塔工业与军事的动力核心，通过举行神圣的充能仪式，引导提瓦特火元素汇聚炉心，提升其能量输出。充能后的炉心将大幅提升战争工业产能，为军队提供充足的步兵装备，同时强化工业整体容量，为后续的技术升级与工厂扩建奠定基础。"

 NAT_Monitor_Furnace_Heart_Energy:"监控炉心能量"
 NAT_Monitor_Furnace_Heart_Energy_desc:"炉心能量波动关乎整个纳塔的安危，建立专业的监控体系至关重要。组建情报小组，以火元素水晶与精密仪器实时监测能量变化，防范外来间谍渗透与能量失衡风险。此举将提升情报机构与间谍活动效率，提前预警潜在危机，为纳塔的稳定提供保障。"

 NAT_Furnace_Heart_Sacrifice_Ritual:"炉心献祭仪式"
 NAT_Furnace_Heart_Sacrifice_Ritual_desc:"以最虔诚的心意举行炉心献祭仪式，向火之神表达敬畏与感恩，祈求炉心能量永恒燃烧。仪式将点燃纳塔子民的信仰热情，大幅提升战争支持度与幸福感，民族主义情怀也将随之高涨，让整个部族在精神层面形成强大的凝聚力。"

 NAT_Recruit_Furnace_Guardians:"招募炉心守卫"
 NAT_Recruit_Furnace_Guardians_desc:"炉心的守护需要专属的精锐部队，从各部族选拔最勇敢、最忠诚的战士，组建炉心守护者军团。通过专项训练提升其战斗能力与驻守效率，增加军队 manpower与招募速度，让炉心始终处于严密保护之下，成为纳塔最坚固的核心防线。"

 NAT_Upgrade_Furnace_Heart_Forge:"升级炉心锻造厂"
 NAT_Upgrade_Furnace_Heart_Forge_desc:"炉心周边的锻造厂是纳塔装备生产的核心，升级其设备与技术，融合古老锻造工艺与现代工业理念，提升工厂输出效率。升级后的锻造厂将增加民用工厂数量，为纳塔提供更多的火炮装备，同时强化工业基础，支撑后续的军事扩张与民生改善。"

 NAT_Seal_Furnace_Heart_Rifts:"封印炉心裂隙"
 NAT_Seal_Furnace_Heart_Rifts_desc:"炉心周边的能量裂隙存在巨大安全隐患，不仅浪费能量，还可能引发火山喷发。组织工程师与法师团队，以火元素结晶与火山岩封印裂隙，加固周边防御工事。此举将大幅提升炉心区域的土地防御能力，加快建设速度，消除潜在的安全危机。"

 NAT_Harness_Furnace_Heart_Heat:"驾驭炉心热能"
 NAT_Harness_Furnace_Heart_Heat_desc:"炉心的巨大热能不应仅用于锻造，更应转化为推动整个纳塔发展的动力。建设热能转化设施，将岩浆热能转化为电力，为工厂与城市供电，提升工业效率。此举将大幅增加电力产量，强化工业产能，让炉心的能量惠及纳塔的每一个角落。"

 NAT_Furnace_Heart_Emergency_Protocol:"炉心应急协议"
 NAT_Furnace_Heart_Emergency_Protocol_desc:"居安思危，制定炉心应急协议是保障纳塔安危的关键。明确战争、自然灾害等危机情况下的炉心保护流程、人员疏散方案与能量调控措施，提升动员速度。协议的实施将减少战争疲惫，强化政府权威，让纳塔在危机面前能够快速响应，守护核心利益。"

 # 阶段3：玛薇卡的意志（21-30）
 NAT_Mavuika_s_Declaration_Of_Will:"玛薇卡的意志宣言"
 NAT_Mavuika_s_Declaration_Of_Will_desc:"玛薇卡作为纳塔的火之神，其意志便是纳塔的发展方向。通过颁布意志宣言，明确纳塔的崛起目标、部族团结的核心价值与对外立场，凝聚全民共识。宣言将带来巨额政治力量与政府权威加成，让民族主义情怀达到新的高度，为纳塔的全面崛起注入精神动力。"

 NAT_Mavuika_s_Duel_Challenge:"玛薇卡的决斗挑战"
 NAT_Mavuika_s_Duel_Challenge_desc:"决斗是纳塔的荣耀象征，玛薇卡亲自发起决斗挑战，向提瓦特宣告纳塔的 warrior 精神。这一举措将点燃全民的战斗热情，大幅提升军队进攻能力与战争支持度，让纳塔的战士在挑战中积累经验，以无畏的姿态面对任何敌人。"

 NAT_Mavuika_s_Flame_Blessing:"玛薇卡的火焰祝福"
 NAT_Mavuika_s_Flame_Blessing_desc:"玛薇卡的火焰祝福是纳塔工业与军事的强心剂，以火之神的权能为战争工业注入纯粹火元素之力。受祝福的工厂将大幅提升装甲装备生产效率，工业产能与工厂输出也将显著增加，让纳塔的军事装备在质量与数量上都占据优势。"

 NAT_Mavuika_s_Tribal_Unification:"玛薇卡的部族统一"
 NAT_Mavuika_s_Tribal_Unification_desc:"在玛薇卡的亲自推动下，实现纳塔所有部族的彻底统一，打破最后的隔阂与界限，形成真正的民族共同体。统一将大幅改善纳塔与各国的关系，提升国家稳定性与政治力量，让纳塔以完整的姿态，正式登上提瓦特的政治舞台。"

 NAT_Mavuika_s_War_Cry:"玛薇卡的战吼"
 NAT_Mavuika_s_War_Cry_desc:"玛薇卡的战吼如火山喷发般震撼人心，响彻纳塔的每一个角落，点燃全民的爱国热情与战斗意志。战吼将大幅提升民族主义与战争支持度，让纳塔子民在面对外敌时万众一心，形成无坚不摧的精神合力，为战争与发展提供不竭动力。"

 NAT_Mavuika_s_Furnace_Heart_Vow:"玛薇卡的炉心誓言"
 NAT_Mavuika_s_Furnace_Heart_Vow_desc:"玛薇卡以自身神格为誓，守护炉心的永恒燃烧，将个人命运与纳塔的未来紧紧绑定。这一神圣誓言将大幅提升国家稳定性，强化法西斯治理的支持度，让全民在信仰的指引下团结一心，为守护纳塔的核心利益不惜一切代价。"

 NAT_Mavuika_s_Warriors_Training:"玛薇卡的战士训练"
 NAT_Mavuika_s_Warriors_Training_desc:"玛薇卡亲自传授古老的火焰战斗技艺，对纳塔的精锐战士进行系统性训练，将火元素之力与格斗技巧完美融合。训练后的战士将大幅提升军队经验与战斗经验获取速度，让纳塔军队的战斗力实现质的飞跃，成为提瓦特最精锐的部队之一。"

 NAT_Mavuika_s_Diplomatic_Assertion:"玛薇卡的外交宣示"
 NAT_Mavuika_s_Diplomatic_Assertion_desc:"纳塔的崛起需要明确的外交立场，玛薇卡亲自进行外交宣示，向邻国表明纳塔的合法权益与发展诉求。宣示将提升纳塔对周边国家的外交影响力与外交权重，改善邻里关系，为纳塔创造稳定的外部发展环境。"

 NAT_Mavuika_s_Flame_Army:"玛薇卡的火焰军团"
 NAT_Mavuika_s_Flame_Army_desc:"在玛薇卡的号召下，组建专属的火焰军团，汇聚各部族的精锐力量，以火元素为核心打造专业化、规模化的军队。军团的组建将大幅提升土地招募速度与 manpower储备，军队进攻能力也将显著增强，让纳塔拥有一支能够横扫战场的钢铁洪流。"

 NAT_Mavuika_s_Ultimate_Flame:"玛薇卡的终极火焰"
 NAT_Mavuika_s_Ultimate_Flame_desc:"解锁玛薇卡的终极火焰力量，将其应用于军事工业，研发最先进的火箭装备与武器系统。终极火焰的加持将大幅提升战争工业产能与工业效率，让纳塔在军事技术上实现弯道超车，拥有威慑提瓦特的战略武器。"

 # 阶段4：对外彰显（31-40）
 NAT_Showcase_Flame_Pride:"彰显火焰荣耀"
 NAT_Showcase_Flame_Pride_desc:"纳塔的荣耀需要向提瓦特彰显，通过举办国际展览、军事表演等活动，展示纳塔的文化底蕴、军事力量与工业成就。此举将点燃全民的民族主义情怀与战争支持度，让各国见证纳塔的崛起，提升纳塔在国际上的知名度与影响力。"

 NAT_Flame_Embassy_In_Liyue:"璃月火焰大使馆"
 NAT_Flame_Embassy_In_Liyue_desc:"与璃月建立正式的外交关系，在璃月港设立火焰大使馆，打通贸易与文化交流渠道。大使馆的建立将大幅改善纳塔与璃月的关系，签订专属贸易协定，提升贸易效率，获取稀缺资源，为纳塔的工业发展提供助力。"

 NAT_Flame_Embassy_In_Mondstadt:"蒙德火焰大使馆"
 NAT_Flame_Embassy_In_Mondstadt_desc:"蒙德作为风之国度，是纳塔重要的外交伙伴。在蒙德设立火焰大使馆，加强与骑士团的沟通与合作，签订贸易协定，促进资源互通。此举将改善纳塔与蒙德的关系，提升贸易效率，为纳塔带来稳定的石油供应，支撑军事与工业发展。"

 NAT_Flame_Diplomatic_Mission_To_Sumeru:"前往须弥的火焰外交使团"
 NAT_Flame_Diplomatic_Mission_To_Sumeru_desc:"须弥的学术与工业技术享誉提瓦特，派遣火焰外交使团前往须弥，建立正式外交关系，开展知识与技术交流。使团的成功将改善纳塔与须弥的关系，提升工业技术研发速度，增加民用工厂数量，让纳塔的工业水平更上一层楼。"

 NAT_Flame_Diplomatic_Mission_To_Inazuma:"前往稻妻的火焰外交使团"
 NAT_Flame_Diplomatic_Mission_To_Inazuma_desc:"稻妻的海军力量与封闭政策闻名于世，派遣外交使团打破隔阂，建立沟通渠道，学习其海军技术与经验。使团将改善纳塔与稻妻的关系，提升纳塔的海军进攻能力，增加海军工厂数量，为纳塔的海洋发展奠定基础。"

 NAT_Flame_Sports_Festival:"火焰体育节"
 NAT_Flame_Sports_Festival_desc:"以体育竞技为纽带，举办火焰体育节，邀请提瓦特各国参与，展示纳塔的 warrior 精神与全民活力。体育节将大幅提升全民幸福感与战争支持度，民族主义情怀也将随之升温，同时促进与各国的文化交流，改善外交关系。"

 NAT_Flame_Cultural_Exchange:"火焰文化交流"
 NAT_Flame_Cultural_Exchange_desc:"文化是民族的灵魂，开展火焰文化交流项目，向提瓦特各国传播纳塔的火焰艺术、音乐、舞蹈与决斗文化。交流将提升纳塔的全球文化影响力，增强国家稳定性，改善与各国的关系，让纳塔的文化成为提瓦特的潮流。"

 NAT_Flame_Trade_Route_Expansion:"火焰贸易路线扩张"
 NAT_Flame_Trade_Route_Expansion_desc:"贸易是发展的引擎，扩张火焰贸易路线，连接提瓦特各大贸易枢纽，建立专属贸易网络。此举将大幅提升贸易效率，获取稀缺的橡胶资源，增加民用工厂数量，让纳塔的经济实力实现跨越式增长，支撑军事与民生发展。"

 NAT_Flame_Peacekeeping_Force:"火焰维和部队"
 NAT_Flame_Peacekeeping_Force_desc:"以火焰的正义守护提瓦特和平，组建火焰维和部队，参与 minor 国家的冲突调解与安全维护。维和部队的建立将提升纳塔的和平keeping 效率，改善与 minor 国家的关系，强化政府权威，让纳塔成为提瓦特的稳定力量。"

 NAT_Flame_International_Duel_Tournament:"火焰国际决斗锦标赛"
 NAT_Flame_International_Duel_Tournament_desc:"决斗是纳塔的核心文化，举办国际决斗锦标赛，邀请提瓦特各国的顶尖战士参赛，彰显纳塔的决斗荣耀。锦标赛将大幅提升纳塔的军队进攻能力与战争支持度，让纳塔的冠军在国际舞台上证明实力，提升国家声望。"

 # 阶段5：决斗体系（41-50）
 NAT_Establish_Duel_Code:"建立决斗法典"
 NAT_Establish_Duel_Code_desc:"决斗需要规范的规则保障，建立正式的决斗法典，明确决斗的流程、裁判标准、胜负判定与奖惩机制，让决斗成为公平、荣誉的象征。法典的建立将提升国家稳定性与政治力量，强化政府权威，让决斗成为纳塔解决争端、彰显荣耀的核心方式。"

 NAT_Duel_Arena_Construction:"决斗竞技场建设"
 NAT_Duel_Arena_Construction_desc:"为决斗打造专属的神圣场地，在首都省份建设宏伟的决斗竞技场，以火山岩与火元素水晶为建材，彰显纳塔的荣耀。竞技场的建设将提升建设速度，增加首都的民用工厂数量，同时成为全民的精神地标，提升幸福感与凝聚力。"

 NAT_Duel_Champion_Title:"决斗冠军头衔"
 NAT_Duel_Champion_Title_desc:"设立决斗冠军头衔，奖励在竞技场中脱颖而出的最强战士，赋予其至高无上的荣誉与权力。冠军头衔的设立将大幅提升军队进攻能力与军队经验，激发战士的训练热情，让纳塔的决斗文化更加深入人心，军事力量也随之增强。"

 NAT_Duel_Training_Camps:"决斗训练营"
 NAT_Duel_Training_Camps_desc:"建立专业化的决斗训练营，由冠军与老兵亲自授课，传授决斗技巧、火元素应用与战场生存能力。训练营的建立将提升土地招募速度与 manpower储备，同时增强军队防御能力，为纳塔培养源源不断的优秀战士与决斗者。"

 NAT_Duel_Reward_System:"决斗奖励体系"
 NAT_Duel_Reward_System_desc:"完善决斗奖励体系，为获胜的决斗者及其家庭提供丰厚的物质奖励、荣誉勋章与社会福利，激发全民参与决斗的热情。奖励体系将大幅提升全民幸福感，减少消费品需求，同时增加政治力量，让决斗成为纳塔人实现自我价值的重要途径。"

 NAT_Duel_Against_Foreign_Warriors:"与外国战士决斗"
 NAT_Duel_Against_Foreign_Warriors_desc:"邀请提瓦特各国的顶尖战士前来纳塔决斗，以武会友，彰显纳塔的决斗实力。与外国战士的交锋将大幅提升纳塔的军队进攻能力与战争支持度，民族主义情怀也将随之高涨，让提瓦特见证纳塔战士的强大。"

 NAT_Duel_Mediation_Council:"决斗调解议会"
 NAT_Duel_Mediation_Council_desc:"以决斗为核心，建立决斗调解议会，用荣誉决斗代替国家间的战争冲突，调解国际争端。议会的建立将改善纳塔与各国的关系，提升国家稳定性，减少战争疲惫，让纳塔成为提瓦特和平的维护者与争端调解者。"

 NAT_Duel_Flame_Blessing:"决斗火焰祝福"
 NAT_Duel_Flame_Blessing_desc:"为决斗者赋予火焰祝福，将火元素之力融入其装备与战斗技巧，提升决斗与实战能力。祝福将提升战争工业产能，为军队提供充足的摩托化装备，强化工业容量，让纳塔的决斗者与军队在战场上拥有更强的机动性与战斗力。"

 NAT_Duel_Legal_Recognition:"决斗法律认可"
 NAT_Duel_Legal_Recognition_desc:"将决斗正式纳入纳塔的法律体系，赋予其解决民事、外交争端的合法地位，让决斗成为纳塔法律的重要组成部分。法律认可将大幅提升政府权威，强化威权治理的支持度，提升国家稳定性，让决斗文化与法治精神完美融合。"

 NAT_Ultimate_Duel_Of_Flame:"火焰终极决斗"
 NAT_Ultimate_Duel_Of_Flame_desc:"举办纳塔历史上最盛大的终极火焰决斗，汇聚全国顶尖决斗者，争夺终极荣耀。决斗将大幅提升军队进攻能力与战争支持度，为军队积累巨额经验，让纳塔的决斗文化达到顶峰，同时激发全民的战斗热情。"

 # 阶段6：火焰权能强化（51-60）
 NAT_Flame_Enchantment_Technique:"火焰附魔技术"
 NAT_Flame_Enchantment_Technique_desc:"研发先进的火焰附魔技术，将纯粹火元素之力注入步兵装备，提升武器的锋利度、杀伤力与耐用性。技术的突破将提升军队进攻能力与步兵装备质量，增加战争工厂数量，让纳塔的步兵在战场上拥有压倒性优势。"

 NAT_Surge_Of_Flame_Tactics:"火焰涌动战术"
 NAT_Surge_Of_Flame_Tactics_desc:"以火元素的流动性与爆发力为灵感，研发火焰涌动战术，强调快速突击、迂回包抄与集中优势兵力突破。战术的应用将提升军队突破能力，推进机动 warfare  doctrine 发展，让纳塔军队具备闪电战的作战能力，横扫战场。"

 NAT_Fire_Element_Resonance:"火元素共鸣"
 NAT_Fire_Element_Resonance_desc:"研究火元素的共鸣原理，让工厂、熔炉与炉心的火元素形成共振，最大化能量利用效率。共鸣技术将提升战争工业产能与工厂输出，让纳塔的工业生产效率实现质的飞跃，为军事与民生提供充足的物资保障。"

 NAT_Inferno_Shield_Development:"炼狱护盾研发"
 NAT_Inferno_Shield_Development_desc:"研发炼狱护盾技术，以火山核心的熔岩晶石为原料，结合火元素魔法，打造兼具防御与反击能力的护盾系统。护盾将大幅提升军队防御能力与装甲单位的防护值，强化要塞防御，让纳塔的装甲部队与防御工事坚不可摧。"

 NAT_Flame_Wave_Offensive:"火焰浪潮攻势"
 NAT_Flame_Wave_Offensive_desc:"借鉴火焰浪潮的连绵不绝与压倒性气势，制定火焰浪潮攻势 doctrine，强调多兵种协同、持续进攻与空地一体作战。攻势将提升军队进攻能力与制空权对地面部队的加成，增加空军经验，让纳塔的海陆空协同作战能力大幅提升。"

 NAT_Ignite_The_Battlefield:"点燃战场"
 NAT_Ignite_The_Battlefield_desc:"为炮兵部队配备火焰附魔弹药，研发能够点燃战场的特殊炮弹，在战斗中制造火海，灼烧敌人、破坏工事。此举将提升战争工业产能，为军队提供充足的火炮装备，同时增强军队进攻能力，让纳塔的炮兵成为战场的主宰。"

 NAT_Flame_Resistance_Training:"火焰抗性训练"
 NAT_Flame_Resistance_Training_desc:"针对纳塔的火山地貌与火焰作战环境，对军队进行火焰抗性训练，提升士兵在高温、火海环境中的生存能力与作战效率。训练将增加军队 manpower，提升土地生存能力，减少战斗伤亡，让纳塔军队能够在极端环境下保持战斗力。"

 NAT_Mavuika_s_Flame_Embrace:"玛薇卡的火焰拥抱"
 NAT_Mavuika_s_Flame_Embrace_desc:"玛薇卡以火之神的全部力量，给予纳塔全民火焰拥抱，将火元素之力融入每一个子民的血脉。拥抱将大幅提升民族主义与幸福感，强化国家稳定性，让纳塔的凝聚力达到前所未有的高度，全民同心同德，共同守护燃烧之地。"

 NAT_Flame_Elemental_Core_Research:"火元素核心研究"
 NAT_Flame_Elemental_Core_Research_desc:"深入研究火元素的核心原理，探索其与核能、高科技的融合可能，解锁最前沿的科技力量。研究将大幅提升研发速度与核研究进程，增加实验室数量，让纳塔在高科技领域实现突破，拥有引领提瓦特的技术实力。"

 NAT_Unyielding_Flame_Will:"不屈的火焰意志"
 NAT_Unyielding_Flame_Will_desc:"培养纳塔全民不屈的火焰意志，在面对任何困难与敌人时，都能坚守信念、顽强抗争。意志的强化将带来巨额政治力量与战争支持度，提升政府权威，让纳塔在逆境中能够逆势崛起，成为不可战胜的火焰之国。"

 # 阶段7：炉心终极进化（61-70）
 NAT_Furnace_Heart_Ascension:"炉心升华"
 NAT_Furnace_Heart_Ascension_desc:"推动炉心实现终极升华，使其能量输出达到神级水平，成为提瓦特最强大的能量核心。升华后的炉心将大幅提升电力产量与工业效率，增加民用工厂数量，为纳塔的工业、军事与民生发展提供无穷动力。"

 NAT_Elemental_Furnace_Integration:"元素熔炉整合"
 NAT_Elemental_Furnace_Integration_desc:"将元素熔炉与纳塔的工业体系深度整合，融合火元素魔法与现代工业技术，实现资源的高效利用与生产的规模化。整合将大幅增加民用工厂数量，获取充足的铝资源，提升工厂输出，让纳塔的工业实力领跑提瓦特。"

 NAT_Eternal_Flame_Initiative:"永恒火焰倡议"
 NAT_Eternal_Flame_Initiative_desc:"发起永恒火焰倡议，集合全国力量，确保炉心的火焰永恒燃烧，永不熄灭。倡议将点燃全民的民族主义情怀，让国家稳定性与幸福感达到顶峰，凝聚全民共识，为守护纳塔的核心命脉贡献全部力量。"

 NAT_Furnace_Heart_Overdrive:"炉心超频"
 NAT_Furnace_Heart_Overdrive_desc:"短暂提升炉心的能量输出功率，进入超频状态，为战争工业提供爆发性动力。超频将大幅提升战争工业产能，为军队提供充足的现代坦克装备，强化工业容量，让纳塔在战争中拥有压倒性的装备优势。"

 NAT_Repel_Furnace_Invaders:"击退炉心入侵者"
 NAT_Repel_Furnace_Invaders_desc:"面对觊觎炉心能量的外敌，组织精锐部队奋起反击，守护纳塔的核心利益。击退入侵者将大幅提升军队防御能力与反坦克作战能力，增加战争支持度，让纳塔的战士在实战中积累经验，强化炉心的防御体系。"

 NAT_Furnace_Heart_Enlightenment:"炉心启迪"
 NAT_Furnace_Heart_Enlightenment_desc:"炉心的能量中蕴含着古老的智慧与科技，通过研究与解析，获取来自火之神的启迪。启迪将大幅提升研发速度与火箭研究进程，增加实验室数量，让纳塔解锁洲际弹道导弹等尖端武器技术。"

 NAT_Flame_Forge_Mastery:"火焰锻造大师"
 NAT_Flame_Forge_Mastery_desc:"纳塔的铁匠达到火焰锻造大师级别，能够利用炉心的终极火焰，打造传奇级别的武器与装备。大师级锻造将提升建设速度，在沿海省份建设二级海军基地，增加海军工厂数量，让纳塔的海军装备质量实现飞跃。"

 NAT_Furnace_Heart_Synergy:"炉心协同"
 NAT_Furnace_Heart_Synergy_desc:"实现炉心与同盟部族的能量协同，共享炉心的资源与力量，强化同盟的凝聚力与战斗力。协同将大幅改善与同盟部族的关系，提升同盟凝聚力与外交权重，让纳塔的同盟成为提瓦特最强大的力量集团。"

 NAT_Flame_Armor_Development:"火焰装甲研发"
 NAT_Flame_Armor_Development_desc:"研发专属的火焰装甲，以火元素附魔的钢材为原料，结合炼狱护盾技术，打造最先进的重型坦克。装甲研发将大幅提升装甲部队的进攻与防御能力，为军队提供充足的重型坦克装备，增加战争工厂数量，让纳塔的装甲部队成为战场的主宰。"

 NAT_Transcend_Furnace_Limits:"超越炉心极限"
 NAT_Transcend_Furnace_Limits_desc:"突破炉心的能量与技术极限，解锁其最本源的力量，让纳塔成为炉心的绝对掌控者。超越极限将带来巨额政治力量与政府权威，提升工业效率，让纳塔的综合实力达到前所未有的高度，成为提瓦特的超级大国。"

 # 阶段8：燃烧的终章（71-80）
 NAT_Teyvat_Flame_Alliance:"提瓦特火焰同盟"
 NAT_Teyvat_Flame_Alliance_desc:"联合提瓦特所有火焰-aligned 国家与部族，组建提瓦特火焰同盟，以纳塔为核心，主导提瓦特的政治格局。同盟的建立将大幅改善与所有提瓦特国家的关系，提升外交权重与同盟凝聚力，让纳塔成为提瓦特的领导者。"

 NAT_Mavuika_s_Ultimate_Duel:"玛薇卡的终极决斗"
