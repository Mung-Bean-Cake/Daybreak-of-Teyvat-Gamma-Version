 # ===================== 一、决议类本地化（SAN_Sangonomiya_Decisions）=====================
 # 内政民生类
 SAN_Sangonomiya_decision_01:"整顿海祇岛行政"
 SAN_Sangonomiya_decision_01_desc:"海祇岛的潮汐往复不休，珊瑚宫的治理却曾因权责芜杂、流程繁冗，如被暗礁牵绊的航船，难抵岛民之心。此番梳理行政体系，恰似为海祇的脉络清淤——明晰各寮各司之责，简化政令传递之途，让珊瑚宫的每一道指令，都能如洋流般顺畅淌过每一处村落的栈桥，抵达每一片渔场的渔火旁，让海祇的治理如潮起潮落般有序，如珊瑚生长般稳固。"

 SAN_Sangonomiya_decision_02:"推行海神信仰教化"
 SAN_Sangonomiya_decision_02_desc:"海祇大御神的庇佑，是刻入岛民骨血的信仰，亦是海祇岛立岛之本。当幕府的铁蹄踏碎鸣神海域的宁静，这份信仰曾如暗潮般沉寂。而今重拾祭祀之仪，传扬海神的意志，以颂歌与祷文凝聚离散的民心——让岛民知晓，反抗幕府的每一次挥剑，皆是守护海神赐下的家园；每一次坚守，皆是回应海祇大御神的召唤。信仰如珊瑚之根，深扎海底，方能让海祇岛在风雨中屹立不倒。"

 SAN_Sangonomiya_decision_03:"兴修水利设施"
 SAN_Sangonomiya_decision_03_desc:"海祇岛依海而生，却也因水而困——干旱时田畴龟裂，潮汐乱时饮水难安。疏浚岛内纵横的水脉，如梳理海神的发丝；修建坚固的储水堤岸，似筑起守护生民的壁垒。这不仅是为农田引来甘洌的灌溉之水，为渔家奉上清甜的饮用之泉，更是让海岛在无常的旱涝与汹涌的潮汐中，扎稳生存的根基。当水脉通、堤岸固，海祇的土地便如被海神亲吻，生生不息，滋养着每一个反抗幕府的灵魂。"

 SAN_Sangonomiya_decision_04:"完善医疗体系"
 SAN_Sangonomiya_decision_04_desc:"反抗幕府的烽火中，刀兵无眼，疫病易生，海祇岛的医者曾如散落在海面的浮木，难承其重。而今整编岛内医者，增设疗愈寮舍，如在波涛中搭建起避风的港湾；推广本土草药的种植之法，传授外伤救治的精要之术，让每一位浴血的反抗军士卒，都能得到及时的疗愈，让每一位受困的平民，都能远离病痛的折磨。医疗如珊瑚的触手，温柔包裹住海祇的生民，让反抗的火种不因伤病而熄灭。"

 SAN_Sangonomiya_decision_05:"渔业产业升级"
 SAN_Sangonomiya_decision_05_desc:"渔业是海祇岛的命脉，如海神赐予的无尽粮仓。然旧有的捕鱼之法粗陋，渔获的存储无序，让这份命脉难承反抗大业之重。改良精巧的捕鱼器具，如为渔家添上海神的助力；划分禁渔的海域，如守护海洋的生机；建立规范的存储与交易体系，如为渔获找到安身之所。当渔业不再仅能饱腹，当渔获可化作支撑军队的物资、换取外界的援助，海祇岛的每一滴海水，都将成为反抗幕府的力量。"

 SAN_Sangonomiya_decision_06:"推行全民教化"
 SAN_Sangonomiya_decision_06_desc:"海祇岛的智慧，藏在潮汐的规律里，刻在珊瑚的纹路中，却曾因蒙昧而难以为继。开设识文习字的学堂，如为岛民点亮海上的灯塔——传授海祇岛的千年历史，让契约精神深植人心；教导基础的算数之法，让渔获的计量、物资的调配精准无误；讲解航海的奥义，让渔家的航船不惧风浪。当岛民不再囿于蒙昧，当知识如潮水般浸润每一个角落，海祇的反抗，便有了智慧的根基，而非仅凭血气之勇。"

 # 军事建设类
 SAN_Sangonomiya_decision_07:"扩充反抗军规模"
 SAN_Sangonomiya_decision_07_desc:"鸣神海域的波涛，因幕府的暴政而翻涌；海祇岛的土地，因眼狩令的苛政而震颤。在各村落征召有志之士，如汇聚散落的潮汐，汇成反抗的洪流。每一位拿起刀枪的岛民，皆是海祇大御神的守护者，皆是珊瑚宫的捍卫者。扩充反抗军的规模，让年轻的渔郎放下渔网，让坚毅的村夫拿起长枪，让反抗的力量如涨潮般不竭，如海浪般汹涌，终将冲垮幕府的铁壁，还稻妻以自由。"

 SAN_Sangonomiya_decision_08:"强化剑术训练"
 SAN_Sangonomiya_decision_08_desc:"海祇岛的剑士，曾以守护家园为念，而今却要以剑锋直面幕府的武士。邀请岛中剑术好手执掌教鞭，如打磨珊瑚般锤炼每一位士卒——打磨刀术的精要，让刀锋如海浪斩礁般凌厉；锤炼身法的灵动，让步伐如潮汐进退般自如。当每一名战士的剑锋，都能劈开幕府的铠甲；当每一次挥砍，都能呼应海祇的意志，近战的搏杀中，便无往而不利，以血肉之躯，筑起守护海祇的屏障。"

 SAN_Sangonomiya_decision_09:"组建弓箭手军团"
 SAN_Sangonomiya_decision_09_desc:"海祇岛的密林遮天，潮间带藏锋，恰是弓手展威之地。选拔视力如鹰隼、臂力如礁石的岛民，组建专属的弓箭部队，如驯养海祇的猎鹰，伺机而击。依托海岛的崎岖地形，开展远程狙击的训练——让箭矢如飞鱼穿梭于林间，如急雨落于潮间，精准洞穿幕府武士的甲胄。当弓手的箭矢划破鸣神海域的风，幕府的军队便如困在浅滩的鱼，步步受制，成为海祇猎手的囊中之物。"

 SAN_Sangonomiya_decision_10:"建造近海巡逻舰队"
 SAN_Sangonomiya_decision_10_desc:"海祇岛的海岸线，是抵御幕府的第一道防线，亦是连接岛民生计的命脉。修缮历经风浪的旧船，打造轻便迅捷的轻舰，如为海祇的臂膀添上利刃；组建常态化的近海巡逻队，如派遣忠诚的卫士，守护每一寸海域。当巡逻舰队的帆影掠过鸣神海域的波涛，幕府水师的袭扰便如泡影般破灭，渔业的航线得以畅通，海祇的门户得以稳固，反抗的后方，便无后顾之忧。"

 SAN_Sangonomiya_decision_11:"完善伏击战术体系"
 SAN_Sangonomiya_decision_11_desc:"海祇岛的每一寸土地，都藏着反抗的智慧——密林如帐，可藏千军；潮间带如阱，能困重甲。研习这些地形的优势，如解读海神的密语，制定针对性的伏击战术：让幕府的军队踏入密林，便被藤萝牵绊，遭箭矢突袭；让他们行至潮间，便被海水围困，受刀兵夹击。当战术如潮汐般变幻，如珊瑚般暗藏锋芒，幕府军队踏入海祇岛的那一刻，便已踏入天罗地网，处处受制，步步维艰。"

 SAN_Sangonomiya_decision_12:"组建珊瑚宫近卫师团"
 SAN_Sangonomiya_decision_12_desc:"珊瑚宫是海祇岛的心脏，心海是反抗大业的魂灵。从反抗军中遴选最精锐的战士，组建直属于珊瑚宫的近卫师团，如挑选最坚硬的珊瑚，筑起守护核心的壁垒。他们是心海的亲卫，寸步不离珊瑚宫的殿宇，守护着海祇的智慧与希望；他们是战局的攻坚利刃，当决战来临，便如出鞘的圣剑，劈开幕府的阵线。近卫师团的旗帜扬起，便是海祇最坚定的意志，便是反抗最无畏的象征。"

 # 外交谋略类
 SAN_Sangonomiya_decision_13:"加强情报网络建设"
 SAN_Sangonomiya_decision_13_desc:"幕府的动向，如鸣神海域的暗流，稍不留意便会吞噬反抗的希望。派遣机敏的细作，深入稻妻城的街巷，潜入踏鞴砂的工坊，如撒下细密的渔网，打捞每一丝有用的讯息。搭建覆盖稻妻全域的情报网，如张开海神的耳目，让幕府的军备调配、将领谋划、兵力部署，皆无所遁形。当情报如潮水般汇聚于珊瑚宫，心海的谋略便有了根基，反抗的每一步，都踏在明处，而非盲目的冲锋。"

 SAN_Sangonomiya_decision_14:"扩大反幕府宣传"
 SAN_Sangonomiya_decision_14_desc:"眼狩令的苛政，如乌云笼罩稻妻的天空；幕府的暴政，如锁链缚住万民的自由。将这些不公编撰成朗朗上口的歌谣，让渔郎的号子中藏着反抗的呐喊；写成掷地有声的檄文，让商旅的行囊中带着觉醒的火种。当歌谣传遍稻妻的村落，檄文贴满鸣神的街巷，受压迫的民众便会如沉睡的火山苏醒，如蛰伏的潮汐奔涌，看清幕府的真面目，站到反抗的旗帜下，让自由的呼声，盖过幕府的威权。"

 SAN_Sangonomiya_decision_15:"寻求璃月进一步支援"
 SAN_Sangonomiya_decision_15_desc:"璃月港的灯火，是提瓦特大陆最沉稳的光，璃月的匠艺，是能支撑反抗的基石。派遣使者乘着海祇的航船，穿越无尽的海域前往璃月，以海祇岛的珊瑚、渔获等特产为礼，以未来平等贸易的承诺为契，换取璃月的物资支援——坚固的钢材、充足的粮草；换取璃月的工匠相助——打造战船的巧匠、修筑工事的能工；更换取璃月的外交声援，让幕府的霸道，在提瓦特的舆论中无处遁形。"

 SAN_Sangonomiya_decision_16:"与蒙德建立友好关系"
 SAN_Sangonomiya_decision_16_desc:"蒙德的风，吹送着自由的气息，这份气息，与海祇岛反抗暴政的初心不谋而合。向蒙德递出橄榄枝，如向同路的旅人伸出援手——交流游击作战的战术，让反抗军的战法如蒙德的风般灵动；碰撞追求自由的理念，让反抗的初心如蒙德的酒般炽热。借蒙德在提瓦特的国际声望，削弱幕府以「天领奉行」为名的舆论优势，让稻妻的自由之路，不再是海祇岛的孤军奋战，而是与蒙德并肩的前行。"

 SAN_Sangonomiya_decision_17:"心理作战升级"
 SAN_Sangonomiya_decision_17_desc:"战争的胜负，不仅在刀兵相见的战场，更在人心的博弈。散布真假难辨的情报，让幕府的将领疑心重重，不知海祇的兵力藏于何处；制造无孔不入的恐慌，让幕府的士卒夜不能寐，惧于海祇的伏击与突袭。当心理的防线先于铠甲破碎，当士气的旗帜先于刀枪倒下，幕府的军队便未战先怯，如惊弓之鸟，纵使甲胄精良、人数众多，也难抵内心的溃败。攻心为上，不战而屈人之兵，方是海祇的智慧。"

 SAN_Sangonomiya_decision_18:"整合反抗军指挥体系"
 SAN_Sangonomiya_decision_18_desc:"反抗的火种曾散落于海祇岛的各个角落，如分散的潮汐，难成巨浪。废除分散的山头制度，统一各支反抗武装的指挥权，如将散落的溪流汇入大海，凝聚成无坚不摧的力量。让心海的每一条谋略，都能如洋流般顺畅传递，无阻碍地贯彻到每一支队伍；让每一次冲锋，都能如潮汐般步调一致，而非各自为战。当指挥体系如珊瑚的骨架般稳固，反抗的力量便会拧成一股绳，直指幕府的核心。"

 # 决战准备类
 SAN_Sangonomiya_decision_19:"全面战备动员"
 SAN_Sangonomiya_decision_19_desc:"鸣神海域的风，已吹来了决战的气息；珊瑚宫的钟，已敲响了动员的号令。发布全民动员令，暂停非必要的民生生产——渔家放下渔网，拿起刀枪；农夫放下锄头，扛起盾牌；工匠放下凿子，打造军械。将所有的人力汇聚，如汇聚海祇的所有潮汐；将所有的物资倾斜，如倾洒海神的所有馈赠。这是为了迎接与幕府的最终对决，是为了守护海祇的信仰，为了稻妻的自由，每一个岛民，皆是战士，每一寸土地，皆是战场。"

 SAN_Sangonomiya_decision_20:"突破幕府海上封锁"
 SAN_Sangonomiya_decision_20_desc:"幕府的海上封锁，如一道铁闸，困住了海祇岛的物资，也困住了反抗的希望。集中所有的战船，如集结海祇的所有利刃；挑选最精锐的战士，如挑选最勇猛的海兽，对封锁线发起雷霆突袭。让战船的冲撞破开幕府的舰阵，让战士的呐喊盖过海浪的轰鸣，用血肉之躯撕开一道缺口，打通海祇岛与外界的物资通道。当封锁被突破，璃月的物资、蒙德的支援便能涌入海岛，反抗的底气，便如涨潮般充盈。"

 SAN_Sangonomiya_decision_21:"夺取制海权"
 SAN_Sangonomiya_decision_21_desc:"制海权，是掌控稻妻战局的关键，是海祇岛立身的根本。以主力舰队直面幕府水师，决战于鸣神海域的波涛之上——战船如珊瑚般列阵，风帆如云朵般舒展，箭矢如暴雨般倾泻，刀兵如潮汐般冲锋。击败幕府的水师，便是斩断幕府的臂膀；夺取稻妻近海的制海权，便是掌握了战事的海上主动权。当海祇的旗帜飘扬在鸣神海域的每一处，幕府的补给便被切断，海祇的进攻便无往不利。"

 SAN_Sangonomiya_decision_22:"攻占幕府港口"
 SAN_Sangonomiya_decision_22_desc:"幕府的港口，是其后勤的咽喉，是其兵力的支点。调集反抗军的陆军，如汇聚陆地上的潮汐；协同海祇的水师，如整合海洋中的力量，水陆并进，攻占这关键的据点。让陆军的刀锋劈开港口的城门，让水师的战船封锁港口的海域，切断幕府的后勤补给，让其前线的军队无粮无械；建立反抗军的前进据点，让海祇的锋芒，直逼稻妻本岛的腹地。港口易主，便是幕府衰败的开始，便是反抗胜利的序章。"

 SAN_Sangonomiya_decision_23:"建立前进作战基地"
 SAN_Sangonomiya_decision_23_desc:"攻占的港口与岛屿，是深入稻妻本岛的跳板，是支撑决战的根基。在此修建坚固的堡垒，如筑起海神的壁垒，抵御幕府的反扑；搭建充足的粮仓，如储存海神的馈赠，保障军队的温饱；打造完备的军械库，如锻造海祇的利刃，补充作战的物资。当前进作战基地的轮廓在海边成型，反抗军便有了稳固的后勤支点，不再是无根的浮萍，而是扎稳根基的珊瑚，可从容向稻妻本岛发起最终的进攻。"

 SAN_Sangonomiya_decision_24:"发起最终决战"
 SAN_Sangonomiya_decision_24_desc:"海祇岛的每一次坚守，每一次谋划，皆是为了这一刻——集结所有的反抗力量，向幕府的核心区域发起总攻。珊瑚宫的旗帜在前，近卫师团的剑锋所向，万千岛民的呐喊如海浪翻涌，鸣神海域的风，都为自由而呼啸。这一战，要么推翻眼狩令的暴政，让稻妻的天空重见自由的光，让海祇大御神的庇佑重回每一寸土地；要么便为海祇的自由，流尽最后一滴血，让反抗的意志，铭刻在鸣神海域的波涛中，永不磨灭。"

 # 战后发展类
 SAN_Sangonomiya_decision_25:"重建稻妻基础设施"
 SAN_Sangonomiya_decision_25_desc:"战火曾燃遍稻妻的土地，道路崩毁，港口残破，民居倾颓，如被狂风摧残的珊瑚。战后的重建，是为了让和平的秩序重回这片土地——修复蜿蜒的道路，让商旅的脚步再次踏遍稻妻；修缮繁忙的港口，让渔帆再次扬起于鸣神海域；重建温馨的民居，让岛民的笑容再次绽放。每一块砖石的堆砌，都是对和平的期盼；每一条道路的延伸，都是对未来的憧憬。当基础设施重回正轨，稻妻的生机，便如潮汐般归来。"

 SAN_Sangonomiya_decision_26:"确立新秩序"
 SAN_Sangonomiya_decision_26_desc:"眼狩令的枷锁已碎，锁国令的壁垒已破，稻妻站在了新生的路口。联合稻妻的有识之士——珊瑚宫的智者、鸣神的匠人、民间的义士，共同制定新的规则：既保留稻妻千年的传统，如守护珊瑚的纹路；又拥抱自由的新风，如接纳海洋的广阔。废除苛政，让民众的愿望得以舒展；确立新规，让稻妻的发展有章可循。当新秩序的钟声敲响，稻妻便告别了黑暗的过往，走向充满希望的新生。"

 SAN_Sangonomiya_decision_27:"发展海神时代经济"
 SAN_Sangonomiya_decision_27_desc:"海祇岛的海洋，是无尽的宝藏，是稻妻新生的底气。开启「海神时代」，便是要将这份海洋优势发挥到极致——深耕渔业，让渔获的丰饶滋养每一个稻妻人；发展盐业，让海盐的咸香成为贸易的名片；开拓远洋贸易，让稻妻的航船驶向提瓦特的每一个港口。当经济的重心向海洋倾斜，当海洋的馈赠惠及每一处角落，稻妻便不再是封闭的孤岛，而是如珊瑚般璀璨，如海洋般包容的新生之国。"

 SAN_Sangonomiya_decision_28:"提升海军实力"
 SAN_Sangonomiya_decision_28_desc:"稻妻的未来，藏于鸣神海域的波涛之中；稻妻的尊严，立于海军的舰艏之上。扩建水师的规模，如壮大海神的臂膀；研发新式的战船，如锻造更锋利的海刃——让船体更坚固，能抵御远洋的风浪；让火炮更精准，能震慑来犯的敌人。当稻妻的海军既能守护近海的安宁，抵御外侮；亦能远航至提瓦特各地，交流贸易，彰显新生稻妻的力量与气度，海祇的荣光，便照彻整片海域。"

 SAN_Sangonomiya_decision_29:"推进科技革新"
 SAN_Sangonomiya_decision_29_desc:"锁国的岁月，让稻妻的科技如停滞的潮汐，落后于提瓦特的脚步。而今打破壁垒，引入璃月精湛的工程技术——让修筑的工事如岩王帝君的造物般坚固；吸纳蒙德灵动的机械理念——让打造的器械如风神的羽翼般精巧。改良稻妻的冶炼之法，让钢材更坚韧；革新造船的工艺，让航船更迅捷；升级建筑的技巧，让屋宇更稳固。以科技推动发展，让稻妻的新生，既有传统的底蕴，亦有时代的锋芒。"

 SAN_Sangonomiya_decision_30:"开启新海祇时代"
 SAN_Sangonomiya_decision_30_desc:"海祇岛的危机已如退潮般消散，反抗的大业终如朝阳般胜利！废除旧有的危机体系，那些因战乱而设的严苛规条，皆让位于和平的发展。以珊瑚宫的智慧为指引——心海的谋略，化作治理的良策；岛民的团结，凝成前行的力量。这是属于海祇的新时代，亦是属于稻妻的新征程：海洋的优势得以释放，自由的火种得以燎原，每一寸土地都焕发新生，每一个岛民都满怀希望，新海祇时代的曙光，已铺满鸣神海域的每一片波涛。"

 # 危机失败决议
 SAN_Sangonomiya_decision_31:"海祇危机加剧"
 SAN_Sangonomiya_decision_31_desc:"鸣神海域的风，吹来了绝望的气息；珊瑚宫的灯，已难照见前行的路。民心如散落的珊瑚，涣散难聚；物资如干涸的水脉，匮乏至极，反抗军的士气跌至谷底，如被巨浪拍碎的船板，再无拼杀的勇气。海祇岛的危机不仅未能缓解，反而如涨潮的海水，愈发深重——幕府的军队步步紧逼，岛内的矛盾层层爆发，失败的阴影如厚重的乌云，笼罩着珊瑚宫的每一处殿宇，笼罩着每一个岛民的心头。"

 # 决议通用提示
 SAN_Sangonomiya_Decision_Les:"行政效率提升"
 SAN_Sangonomiya_Les:"海祇岛发展指数调整"
 SAN_Sangonomiya_Decision_Add:"危机指数上升"
 SAN_Sangonomiya_Decision_End:"新海祇时代开启"

 # ===================== 二、国家精神类本地化（ideas）=====================
 ns_san_unity:"珊瑚同心"
 ns_san_unity_desc:"海祇岛的民众，因对海祇大御神共同的信仰，因反抗幕府暴政共同的目标，如珊瑚的枝丫般紧紧相拥，凝聚成不可分割的整体。这份团结，是抵御幕府铁蹄的坚盾，是支撑反抗大业的基石——当岛民同心，村落的炊烟便不会因战乱而熄灭；当军队同心，冲锋的号角便不会因困境而停歇。风雨飘摇中，这份同心让海祇岛屹立不倒，稳定如深海的珊瑚，战意如汹涌的潮汐，皆为之蓬勃提升。"

 ns_geo_ally:"璃月之盟"
 ns_geo_ally_desc:"璃月港的岩色，与海祇岛的珊瑚色，在反抗幕府的征程中相融，缔结下牢不可破的友好盟约。这份盟约，为海祇岛带来了实打实的支援——璃月的工匠涌入海岛，让民用工厂的齿轮如岩山的钟摆般高效运转；璃月的商队穿越海域，让钢材、铁矿等战略物资如溪流般源源不断供给。当璃月的岩之守护与海祇的水之坚韧相融，反抗的底气便愈发充足，胜利的曙光便愈发清晰。"

 ns_kokomi_leader:"心海的智略"
 ns_kokomi_leader_desc:"珊瑚宫心海，是海祇大御神的智慧化身，是反抗大业的定海神针。她的智谋，如鸣神海域的洋流，看似平静，却藏着无尽的力量；她的领导力，如深海的珊瑚，看似温柔，却有着坚韧的根基。以她的智略统筹全局，科技研究便如借了海流的助力，事半功倍；作战规划便如循着潮汐的规律，精准无误。就连陆军的组织度，也因她的调度而大幅提升，每一支队伍，都如她手中的棋子，步步为营，直指胜利。"

 ns_san_victory:"珊瑚的胜利"
 ns_san_victory_desc:"击败幕府军队的阶段性胜利，如一道光，刺破了笼罩海祇岛的阴霾，让全岛上下的士气如涨潮般高涨。这份胜利，是对每一位反抗者的犒赏，是对海祇信仰的印证——国家稳定度如磐石般稳固，不再因幕府的威压而动摇；战争支持度如火焰般炽烈，每一个岛民都愿为自由再战。人力的补充如潮汐般不竭，受伤的军队快速归队；建筑的建造如珊瑚生长般迅速，破损的家园快速重建，胜利的红利，惠及海祇的每一个角落。"

 ns_sea_god_era:"海神时代"
 ns_sea_god_era_desc:"推翻幕府的统治后，海祇岛被压抑已久的海洋优势，如冲破堤岸的潮水，全面释放。这是属于海神的时代——战船的战力如海兽般凶猛，驰骋于鸣神海域，无人可挡；海洋的资源产出如珊瑚般繁茂，渔获、海盐、珊瑚，皆成稻妻的财富；社会的稳定如深海的洋流，平静而持久，岛民安居乐业，不再受战乱之苦。黄金发展期的到来，让稻妻的新生，如朝阳般，从鸣神海域的海平面升起，光芒万丈。"

 ns_temp_buff:"临时战备增益"
 ns_temp_buff_desc:"决战的脚步已近，鸣神海域的风都带着刀兵的气息，反抗军开启短期的战备强化，如为锋利的刀刃淬上最后一道火。步兵的攻击力如涨潮的海浪，陡然提升，每一次挥刀都能劈开幕府的重甲；作战规划的速度如疾行的海鸟，大幅加快，每一个战术都能快速落地。这份临时的增益，是海祇岛为守护自由的最后蓄力，是珊瑚宫为迎接决战的精准布局，虽短暂，却足以在关键时刻，扭转战局，奠定胜局。"

 ns_victory_buff:"胜利的荣光"
 ns_victory_buff_desc:"大胜之后的荣光，如温暖的洋流，包裹着每一位反抗军战士的心房，军队的士气如虹，直冲云霄。这份荣光，化作实实在在的战力——陆海两军的经验获取速度如乘风的航船，飞速加快，新兵快速成长为老兵；补给的消耗却因士气高昂而有所减少，战士们以信念为粮，以勇气为水，无需过多物资，亦能坚守阵地。胜利的荣光，是对过往牺牲的告慰，亦是对未来征程的加持。"

 ns_san_era:"新海祇时代"
 ns_san_era_desc:"稻妻重归和平，战火的硝烟如退潮般消散，新海祇时代的曙光，如第一缕晨光，洒遍鸣神海域的每一寸土地。这是属于自由与新生的时代——全领域的研究速度如洋流般顺畅，从前未解的难题，如今迎刃而解；建筑建造的效率如珊瑚生长般迅猛，从前破败的家园，如今焕然一新；人力的增长如鱼群繁衍般旺盛，从前匮乏的兵源，如今源源不断。质的飞跃，让稻妻的未来，如海洋般广阔，如珊瑚般璀璨。"

 # ===================== 三、国策树类本地化（focus_tree）=====================
 # 根节点
 SAN_root:"海祇的抉择"
 SAN_root_desc:"鸣神海域的波涛，在珊瑚宫的阶前翻涌；稻妻的命运，在海祇岛的抉择中走向未知。站在命运的十字路口，珊瑚宫心海执起指引的权杖——是重拾海祇大御神的信仰，以祭祀与传承凝聚岛民之心，让精神的根基如珊瑚般深扎海底；还是厉兵秣马，以刀兵与谋略反抗幕府的暴政，让自由的火种如海浪般席卷稻妻？每一步选择，都牵动着鸣神海域的风，都决定着海祇岛的未来，都关乎着稻妻万民的自由。"

 # 第一列：内政根基
 SAN_01_sea_god_belief:"海神信仰"
 SAN_01_sea_god_belief_desc:"海祇大御神的庇佑，是海祇岛千年的传承，是岛民心中不灭的光。重拾这份信仰，如拂去珊瑚上的尘埃，让海神的意志再次照亮海岛——举办庄严的祭祀大典，让钟声回荡于鸣神海域；传承古老的信仰故事，让精神的纽带连接每一个岛民。这份信仰，不是盲目的崇拜，而是反抗大业最坚实的精神根基，当岛民因信仰而凝聚，纵使幕府的铁蹄再强，也难撼海祇的决心。"

 SAN_02_island_govern:"海岛治理"
 SAN_02_island_govern_desc:"海祇岛的治理，如梳理珊瑚的脉络，需精准而细致。优化行政架构，裁撤冗余的寮署，明晰各部门的权责，让政令的传递如洋流般顺畅；提升治理效率，简化繁琐的流程，让岛民的诉求如溪流般直达珊瑚宫。在核心区域增设民用工厂，让工坊的齿轮与海岛的潮汐同频，保障民生的运转——当治理的根基稳固，海祇岛便如锚定的航船，纵使风浪来袭，也能稳如泰山。"

 SAN_03_food_self_supply:"粮食自给"
 SAN_03_food_self_supply_desc:"幕府的物资封锁，曾让海祇岛的粮仓如干涸的潮池，难以为继。开垦沿海的滩涂为农田，让咸涩的土地长出饱满的稻穗；优化渔业的分配制度，让渔获的丰饶惠及每一个村落。提升粮食的自给率，便是斩断幕府的钳制，让岛民不再为温饱担忧，让反抗军不再因缺粮而怯战。当仓廪充实，民心便安定；当粮食无忧，反抗的决心便如鸣神海域的波涛，汹涌不息。"

 SAN_04_water_source_control:"水源管控"
 SAN_04_water_source_control_desc:"水是海祇岛的命脉，是生民的根基，是农田的滋养。掌控岛内的关键水源，如守护海神的馈赠，不让一滴甘泉浪费；修建坚固的储水设施，如筑起蓄水的珊瑚堤，应对无常的旱涝。提升补给的上限，让军队的饮水充足，让农田的灌溉无忧，让每一个岛民都能喝上清甜的水。当水源的管控如潮汐般有序，海祇岛的稳定，便有了最基础的保障。"

 SAN_05_local_loyalty:"民心归附"
 SAN_05_local_loyalty_desc:"民心是海祇岛最珍贵的财富，是反抗大业最坚实的后盾。推行惠民的政策——减免渔税，让渔家的收获更多；修缮民居，让岛民的住所更安；倾听岛民的诉求，让珊瑚宫的决策更贴民心。当心海的声望如朝阳般，照进每一个岛民的心房，战争支持度便会节节攀升。民心归附，不是靠威压，而是靠体恤，当岛民愿为珊瑚宫赴汤蹈火，反抗的道路，便无往而不利。"

 SAN_06_tradition_education:"传统教化"
 SAN_06_tradition_education_desc:"海祇岛的传统，是刻在珊瑚上的历史，是融在海水中的智慧。以这些传统与历史教化民众，如为幼苗浇灌海水，让文化的根基深扎。教孩童识读海祇的文字，让千年的故事得以传承；教成人理解契约的精神，让岛民的相处如潮汐般和谐。这份教化，不仅是文化的延续，更是智慧的传递——全岛的研究学习效率随之提升，从前难懂的技艺，如今易于掌握，以教兴岛，以文聚力，海祇的未来，便有了文化的支撑。"

 SAN_07_island_defense_works:"海防工事"
 SAN_07_island_defense_works_desc:"海祇岛的海岸线，是抵御幕府的第一道屏障，容不得半点疏忽。在关键的海岸修建坚固的要塞，如筑起珊瑚的壁垒，直面鸣神海域的风浪；强化近海的防御能力，布置锋利的拒马，架设精准的弩箭，让幕府水师的突袭如撞在礁石上的浪花，碎于无形。当海防工事如深海的珊瑚礁般坚固，海祇岛的门户便牢不可破，反抗的后方，便无被袭扰之虞。"

 SAN_08_fishery_industrial:"渔业产业"
 SAN_08_fishery_industrial_desc:"渔业是海祇岛的命脉，亦是反抗大业的隐形战力。升级渔业的加工设施，让渔获的保存更长久，成为军队的口粮；完善渔业的存储体系，让物资的调配更高效，应对战时的需求。增设军用工厂，将渔业的优势转化为战争的潜力——用鱼骨打造箭矢，用渔帆缝制营帐，用渔船改造战船。当渔业不再仅是饱腹之需，更是战之根基，海祇岛的反抗，便有了源源不断的支撑。"

 SAN_09_medicine_system:"医疗体系"
 SAN_09_medicine_system_desc:"战火纷飞的岁月，伤病是反抗军最大的敌人之一。完善医疗救治体系，如为海祇岛撑起一把疗愈的伞——广设疗愈寮舍，让受伤的战士有处可医；培训专业的医者，让病痛的岛民有药可治；研发本土的草药，让疗愈的成本更低。当军民的生存保障提升，战争的伤亡便大幅减少，战争支持度也随之高涨——岛民知道，珊瑚宫不仅能带领他们反抗，更能守护他们的生命。"

 SAN_10_unity_of_coral:"珊瑚同心"
 SAN_10_unity_of_coral_desc:"海祇岛的团结，如珊瑚的枝丫，交错相依，不可分割，这份同心，值得成为整个海岛的国家精神。「珊瑚同心」的信念，不是一句空泛的口号，而是融入每一个岛民血脉的共识——渔家为军队提供渔获，农夫为军队送上粮食，工匠为军队打造兵器，战士为岛民守护家园。当这份信念成为反抗幕府最坚实的后盾，海祇岛便如一块完整的珊瑚，坚不可摧，所向披靡。"

 # 第二列：军事建设
 SAN_11_rebel_recruit:"反抗军征兵"
 SAN_11_rebel_recruit_desc:"眼狩令的苛政，让稻妻万民身陷苦难，海祇岛的反抗，不应是少数人的战斗。扩大征兵的范围，走进每一个村落，呼唤每一个有血性的稻妻人——年轻的渔郎，放下渔网，拿起刀枪，为守护家人而战；年长的猎户，放下弓箭，加入军队，为守护家园而战。让更多热血之士加入反抗的队伍，如汇聚更多的水滴，汇成反抗的洪流，让幕府知道，海祇的反抗，是万民的意志，而非一隅的抗争。"

 SAN_12_army_organization:"军队整编"
 SAN_12_army_organization_desc:"散落的反抗武装，如分散的潮汐，虽有力量，却难成气候。对这些队伍进行统一整编，如将分散的溪流汇入大海——统一编制，让每一支队伍都有清晰的归属；统一训练，让每一个战士都有相同的战力；统一指挥，让每一次冲锋都有一致的目标。陆军的经验随之提升，步兵的协同性大幅增强，当整编后的反抗军列阵于鸣神海域之滨，便如一道坚固的防线，直面幕府的铁蹄。"

 SAN_13_sword_training:"剑术训练"
 SAN_13_sword_training_desc:"海祇岛的剑士，需以剑锋回应幕府的刀光。强化剑术训练，如打磨每一把利刃——邀请岛中顶尖的剑豪执教，传授劈、砍、刺的精要；设置严苛的训练科目，锤炼战士的臂力与身法。当步兵装备的攻击效能提升，每一次挥剑都能劈开幕府的铠甲，每一次近身都能取敌将首级，近战搏杀的优势，便牢牢握在海祇反抗军的手中。"

 SAN_14_spear_formation:"枪阵编制"
 SAN_14_spear_formation_desc:"幕府的骑兵，如奔涌的潮水，曾让反抗军难以抵挡。组建专业化的枪阵部队，如筑起一道钢铁的丛林——训练战士结阵而行，长枪如林，直指前方；优化枪阵的战术，让阵型可攻可守，应对骑兵的冲击。当步兵装备的防御能力提升，枪阵如珊瑚的壁垒，挡住幕府骑兵的冲锋，反抗军便不再惧于重甲的冲击，战场的主动权，便悄然转移。"

 SAN_15_archer_corps:"弓箭手军团"
 SAN_15_archer_corps:"弓箭手军团"
 SAN_15_archer_corps_desc:"海祇岛的密林与潮间带，是弓手的天然战场。组建专职的弓箭手军团，如驯养一群精准的海鹰——挑选视力佳、臂力足的战士，配备精良的弓箭；依托海岛地形训练，让箭矢能穿透林间的缝隙，击中潮间的敌人。补充远程作战的装备，完善战术体系，当弓手的箭矢如暴雨般落下，反抗军的战术便不再单一，远近结合，攻守兼备，幕府的军队便无处可藏。"

 SAN_16_navy_boat_build:"战船建造"
 SAN_16_navy_boat_build_desc:"鸣神海域的制海权，需以战船为凭。投入充足的资源，打造新式的战船——让船体更轻便，适应近海的浅滩；让船帆更坚韧，抵御海上的狂风；让火炮更精准，打击远处的敌舰。海军的经验随之大幅提升，工匠的造船技艺愈发精湛，战士的驾船技巧愈发娴熟。当新式战船的帆影出现在鸣神海域，海祇岛争夺制海权的脚步，便迈出了最坚实的一步。"

 SAN_17_coastal_patrol:"近海巡逻"
 SAN_17_coastal_patrol_desc:"海祇岛的海疆，需有忠诚的卫士守护。建立常态化的近海巡逻机制，如让潮汐的巡守永不停止——划分巡逻的海域，让每一寸海岸线都有战船覆盖；制定巡逻的规则，让白天与黑夜都有战士值守。驱逐舰的防御能力随之提升，应对突袭的反应更快，对幕府的情报掌握也更充分。当巡逻的战船穿梭于鸣神海域，幕府水师便不敢轻易越界，海祇的海疆，便永远安宁。"

 SAN_18_ambush_tactics:"伏击战术"
 SAN_18_ambush_tactics_desc:"海祇岛的地形，是反抗军最有利的武器。钻研海岛地形下的伏击战术，如解读海神的作战密语——在密林设伏，利用藤萝与树木隐藏身形；在潮间设伏，利用潮汐的涨落困住敌人。反抗军师团的夜战能力随之提升，能在黑暗中精准出击；陆军的组织度也随之增长，战术的执行更高效。当伏击战术运用自如，幕府军队踏入海祇岛，便如踏入预设的陷阱，防不胜防。"

 SAN_19_logistics_system:"后勤体系"
 SAN_19_logistics_system_desc:"兵马未动，粮草先行，后勤是反抗军的生命线。完善后勤补给体系，如梳理海祇岛的物资脉络——建立统一的粮仓，让粮食的存储更安全；打造便捷的运输路线，让物资的调配更高效；制定合理的补给规则，让每一份物资都用在刀刃上。补给的消耗大幅降低，军队的持续作战能力显著增强，当后勤体系如珊瑚的根系般稳固，反抗军便无缺粮少械之虞，可从容与幕府周旋。"

 SAN_20_elite_sangonomiya:"珊瑚宫近卫"
 SAN_20_elite_sangonomiya_desc:"珊瑚宫是海祇的核心，需有最精锐的卫士守护。组建直属于珊瑚宫的精英近卫师团，如挑选最坚硬的珊瑚，打造反抗军的王牌部队——从全军遴选百里挑一的战士，进行严苛的训练；配备最精良的装备，赋予最崇高的使命。他们是战局的定海神针，当决战来临，便如出鞘的圣剑，劈开幕府的阵线；他们是珊瑚宫的屏障，当危机出现，便如坚固的堡垒，守护心海的安全。"

 # 第三列：心海专属智谋
 SAN_21_kokomi_strategy_book:"心海兵法"
 SAN_21_kokomi_strategy_book_desc:"珊瑚宫心海的智略，如鸣神海域的洋流，藏着无尽的作战智慧。将毕生所学编撰为兵法，如将海神的指引凝练成册——记录海战的技巧，让战船的调度更精准；总结陆战的经验，让军队的冲锋更有序；梳理治理的心得，让海岛的运转更高效。这份兵法在反抗军内推广，全领域的研究速度大幅提升，从前难解的战术，如今一看便懂；从前复杂的工艺，如今一学便会，以智取胜，方是海祇的本色。"

 SAN_22_war_planning:"战争规划"
 SAN_22_war_planning_desc:"心海亲自主持作战规划，如海神亲自指引反抗的方向。她的规划，如潮汐的规律，精准而有序——分析幕府的兵力部署，找到最薄弱的环节；制定进攻的路线，避开最危险的陷阱；安排防守的点位，筑牢最关键的屏障。作战规划的速度大幅提升，对幕府的情报掌握度也显著增强，每一步布局都精准致命，让幕府的军队，永远落在心海的算计之后。"

 SAN_23_intelligence_network:"情报网络"
 SAN_23_intelligence_network_desc:"情报是战争的眼睛，是心海谋略的根基。搭建覆盖稻妻全域的情报网络，如张开海神的耳目——细作深入稻妻城，打探幕府的决策；密探潜伏踏鞴砂，监视军械的制造；斥候游走鸣神岛，追踪军队的动向。深入掌握幕府的每一个动向，同时利用假情报扰乱敌方的判断，削弱其组织度。当情报网络如珊瑚的触手般遍布稻妻，反抗军便永远立于不败之地。"

 SAN_24_counter_eye_order:"反抗眼狩令"
 SAN_24_counter_eye_order_desc:"眼狩令是幕府最严苛的暴政，是稻妻万民最深的伤痛。以这份苛政为突破口，发起全民反抗运动——在村落宣讲眼狩令的危害，让民众看清幕府的真面目；在街头组织抗议的游行，让反抗的呼声传遍稻妻。战争支持度随之暴涨，每一个受压迫的民众都愿加入反抗；心海的领袖声望也达到新高度，成为反抗眼狩令的精神旗帜。"

 SAN_25_anti_bakufu_propaganda:"反幕府宣传"
 SAN_25_anti_bakufu_propaganda_desc:"舆论的战场，与刀兵的战场同样重要。扩大反幕府宣传的范围与力度，如让反抗的声音如海浪般席卷稻妻——将幕府的暴政写成檄文，贴满每一个城镇的墙壁；将眼狩令的苛政编成歌谣，唱遍每一个村落的街巷。世界对稻妻暴政的关注随之提升，幕府的舆论优势荡然无存；反抗军的战意愈发高涨，每一个战士都明白，他们的战斗，是为了全稻妻的自由。"

 SAN_26_psych_warfare:"心理作战"
 SAN_26_psych_warfare_desc:"攻心为上，是心海兵法的核心，亦是反抗幕府的关键。对幕府军队展开心理攻势，如用无形的风浪，瓦解其战斗意志——散布假情报，让幕府将领疑心重重，错判战局；制造恐慌氛围，让幕府士卒惶惶不安，无心作战。敌方的组织度大幅下降，军队的调度混乱不堪；反抗军的战争支持度持续攀升，士气如虹。不战而屈人之兵，方是最高明的战术。"

 SAN_27_alliance_prepare:"结盟准备"
 SAN_27_alliance_prepare_desc:"海祇岛的反抗，不应是孤军奋战，提瓦特的盟友，是胜利的重要助力。整顿外交体系，培养专业的使者，如打磨海祇的外交之剑；积累充足的外交点数，准备丰厚的礼物，如备妥结盟的诚意。国家的稳定度因外部环境的改善而提升，幕府的孤立无援，让反抗的道路更顺畅。做好充分的准备，才能与提瓦特各国缔结盟约，让海祇的反抗，成为提瓦特的正义之战。"

 SAN_28_geo_alliance_diplomacy:"璃月外交"
 SAN_28_geo_alliance_diplomacy_desc:"璃月的岩之守护，是海祇岛最坚实的外援。与璃月达成正式的外交盟约，如让珊瑚与岩山相融，牢不可破。「璃月之盟」的国家精神随之激活，璃月的工匠带来先进的技艺，钢材等战略资源的产出大幅提升；璃月的商队带来充足的物资，反抗军的装备愈发精良。借力璃月，补强海祇的短板，反抗的力量，便如虎添翼。"

 SAN_29_anemo_goodwill:"蒙德友好"
 SAN_29_anemo_goodwill_desc:"蒙德的风之自由，与海祇岛的反抗初心一脉相承。与蒙德建立友好关系，如让海风与岛风相融，自由的气息更浓。国家的稳定度随之提升，蒙德的声望让幕府不敢轻易对海祇岛施压；航空领域的研究因技术交流而加快，反抗军的侦查与运输能力显著增强。携手蒙德，共求自由，稻妻的自由之路，便多了一份助力，多了一份希望。"

 SAN_30_kokomi_absolute_lead:"心海领袖"
 SAN_30_kokomi_absolute_lead_desc:"心海的智略，指引着海祇岛的方向；心海的担当，赢得了全岛的拥戴。确立心海的绝对领导地位，如让海神的意志，成为海祇的唯一指引。「心海的智略」国家精神随之激活，科技研究、作战规划、军队调度，皆事半功倍。领袖的声望达到顶峰，每一个岛民都愿追随心海的脚步，反抗的大业，因心海的领导，愈发清晰，愈发接近胜利。"

 # 第四列：决战与未来
 SAN_31_final_prepare:"最终备战"
 SAN_31_final_prepare_desc:"决战的号角即将吹响，鸣神海域的每一寸土地，都弥漫着紧张的气息。整合所有的资源——粮食、军械、人力，如将海祇岛的所有力量汇聚于一点；开启最终决战的战备阶段，如为最后的冲锋磨利每一把刀枪。战争支持度达到峰值，每一个岛民都愿为自由献出一切；人力储备也大幅提升，每一个能拿起武器的人，都站到了反抗的前线。这是最后的蓄力，是迎接胜利的最后准备。"

 SAN_32_break_siege:"突破封锁"
 SAN_32_break_siege_desc:"幕府的海上封锁，如一道无形的墙，困住了海祇岛的希望。集中所有的精锐力量，如汇聚海祇的所有勇气，对封锁线发起突袭——战船冲锋，撞开幕府的舰阵；战士登船，拼杀幕府的士卒。步兵装备的整体攻击力大幅提升，每一次挥刀都带着破釜沉舟的决心；陆军的组织度也大幅增长，每一次冲锋都步调一致。冲破这道桎梏，打通对外的海路，海祇岛的反抗，便有了外界的支援，胜利便近在眼前。"

 SAN_33_sea_route_control:"制海权"
 SAN_33_sea_route_control_desc:"鸣神海域的制海权，是决定稻妻战局的关键。与幕府水师展开决战，如海神与暴君的终极对决——战船如珊瑚般列阵，火炮如雷霆般轰鸣，战士如海浪般冲锋。击败幕府水师，夺取稻妻近海的制海权，驱逐舰的攻击能力全面提升，海军的经验也大幅增长。掌控了海洋，便掌控了战局的补给，掌控了进攻的路线，海祇岛的胜利，便有了最坚实的保障。"

 SAN_34_attack_port:"攻占港口"
 SAN_34_attack_port_desc:"幕府控制的关键港口，是其后勤的咽喉，是反抗军前进的跳板。以陆海协同的战术，发起猛攻——陆军从陆路包围，水师从海路封锁，让港口的幕府军队无处可逃。攻占港口后，陆军的经验暴涨，战士们历经实战的洗礼，愈发勇猛；大批的步兵装备补充到位，反抗军的战力愈发强盛。后勤支点的建立，让反抗军的进攻，有了稳固的根基。"

 SAN_35_forward_base:"前进基地"
 SAN_35_forward_base_desc:"攻占的港口，是深入稻妻本岛的前哨。建立前进作战基地，如在敌人的腹地，种下海祇的火种——修建坚固的堡垒，抵御幕府的反扑；搭建充足的粮仓，保障军队的温饱；打造完备的军械库，补充作战的物资。海军的经验大幅提升，巡洋舰的攻击能力也得到强化，进攻稻妻本岛的根基已固，海祇岛的反抗，终于走到了反攻的时刻。"

 SAN_36_decisive_battle:"决战"
 SAN_36_decisive_battle_desc:"反抗的征程，终于走到了最后一步——向幕府的核心区域发起最终决战。珊瑚宫的旗帜在前，心海的智略在后，万千反抗军战士的呐喊，如鸣神海域的巨浪，直冲幕府的主城。全岛的战争支持度达到前所未有的高度，每一个岛民都在为决战助威；陆军的组织度也达到顶峰，每一支队伍都如臂使指，精准执行战术。背水一战，定鼎稻妻，自由的曙光，就在眼前。"

 SAN_37_victory_of_coral:"珊瑚的胜利"
 SAN_37_victory_of_coral_desc:"幕府的主力被击败，反抗的大业终获胜利！「珊瑚的胜利」国家精神随之激活，如温暖的洋流，包裹着每一个海祇岛民。国家的稳定度大幅提升，战乱的阴霾消散，和平的阳光洒遍鸣神海域。这是珊瑚的凯歌，是海祇的荣光，是稻妻万民的新生。庆祝胜利的同时，休养生息，为稻妻的重建，为新海祇时代的开启，做好准备。"

 SAN_38_rebuild_inazuma:"重建稻妻"
 SAN_38_rebuild_inazuma_desc:"战争的创伤，如珊瑚上的裂痕，需要用心修复。战后重建工作全面展开，如为稻妻披上新生的衣裳——修复崩毁的道路，让商旅的脚步再次踏遍稻妻；重建残破的民居，让岛民的笑容再次绽放；增加民用工厂的数量，让工坊的齿轮再次转动。建筑建造的速度因全民参与而加快，每一个稻妻人都在为家园的重建出力，百废俱兴，稻妻的生机，如潮汐般归来。"

 SAN_39_new_order:"新秩序"
 SAN_39_new_order_desc:"眼狩令的枷锁已碎，锁国令的壁垒已破，稻妻需要新的秩序，指引前行的方向。联合稻妻各方势力——珊瑚宫的智者、鸣神的匠人、民间的义士，共同制定新的规则。「胜利的荣光」加持下，国家的稳定度迎来历史性提升，每一个稻妻人都认可这份新秩序，都愿为稻妻的新生努力。制定新规，开启新篇，稻妻的未来，如鸣神海域的朝阳，充满希望。"

 SAN_40_era_of_sea_god:"海神时代"
 SAN_40_era_of_sea_god_desc:"「海神时代」正式开启，如海神的祝福，降临在每一寸稻妻的土地上。同名国家精神激活，海祇岛的海洋优势全面释放——人力储备如鱼群般繁衍，岛民的生活愈发富足；粮食等资源产出如珊瑚般繁茂，稻妻的粮仓愈发充实。这是属于海祇的时代，是属于稻妻的新生，以海立邦，光耀稻妻，鸣神海域的波涛，都在为这个新时代欢呼。"

 # ===================== 四、事件类本地化（SAN_Event）=====================
 # 01 海神信仰触发事件
 SAN_event.1_title:"海神的回响"
 SAN_event.1_desc:"当祭祀的钟声再次响彻海祇岛的上空，当海神的颂歌再次飘荡于鸣神海域的风中，重拾海神信仰的举措，如投入深海的石子，激起了最温暖的回响。岛民们身着传统的服饰，聚集在珊瑚宫前的祭台，以最虔诚的姿态，向海祇大御神祈福。这份信仰的回归，让涣散的民心如珊瑚般凝聚，每一个岛民都重新找到了精神的归属；人力也得到了充足的补充，年轻的岛民自愿加入反抗军，以海神的名义，守护家园。"
 SAN_event.1_option:"传承海神意志"

 # 02 海岛治理触发事件
 SAN_event.2_title:"海祇新政"
 SAN_event.2_desc:"珊瑚宫的新政，如清澈的洋流，淌过海祇岛的每一个角落，优化后的行政体系，让治理的效率如涨潮般显著提升。冗余的寮署被裁撤，权责的边界被明晰，岛民的诉求不再被层层推诿，而是能快速传至珊瑚宫；民用工厂的齿轮转动得愈发顺畅，生产的效率大幅增长，粮食与物资的产出愈发充足；建筑建造的速度也如珊瑚生长般加快，破损的村落快速修缮，新的工坊快速建起，海祇岛的民生，在新政的滋养下，愈发稳固。"
 SAN_event.2_option:"推行新政，稳固民生"

 # 03 粮食自给触发事件
 SAN_event.3_title:"仓廪实，民心安"
 SAN_event.3_option:"扩大粮食种植与捕捞"

 # 04 水源管控触发事件
 SAN_event.4_title:"水脉通，海岛宁"
 SAN_event.4_desc:"当岛内的水脉被精心疏浚，当坚固的储水设施如珊瑚堤般矗立，水源管控体系的完善，如为海祇岛注入了最珍贵的活力。补给的上限大幅提升，军队的饮水不再短缺，农田的灌溉不再受限，即便是干旱的季节，岛民也能喝上清甜的海水；岛内的稳定度也随之提高，因缺水而起的矛盾烟消云散，每一个村落都沉浸在水脉畅通的安宁之中，海祇岛的根基，因水而稳，因水而兴。"
 SAN_event.4_option:"强化水源管理，惠及全民"

 # 05 民心归附触发事件
 SAN_event.5_title:"心悦诚服"
 SAN_event.5_desc:"一系列惠民的政策，如温暖的海风，吹进了每一个岛民的心房——减免渔税，让渔家的收获更多；修缮民居，让岛民的住所更安；倾听诉求，让岛民的声音被重视。这份体恤与关怀，让岛民对珊瑚宫心海的拥戴达到了新的高度，走在海祇岛的街巷，随处可闻对心海的称颂，随处可见向珊瑚宫朝拜的岛民。领袖的声望如朝阳般攀升，战争支持度也同步高涨，每一个岛民都愿为心海，为反抗大业，倾尽所有。"
 SAN_event.5_option:"倾听民声，凝聚民心"

 # 06 传统教化触发事件
 SAN_event.6_title:"文以化民"
 SAN_event.6_desc:"当学堂的读书声取代了战乱的厮杀声，当海祇岛的传统与历史被娓娓道来，传统教化的推行，如为岛民打开了一扇智慧的窗。孩童们识读着记录海神故事的文字，成年人理解着契约精神的真谛，岛民的文化素养如潮水般提升；全领域的研究效率也随之增长，从前难懂的造船技艺、冶炼之法，如今被更多人掌握；人力储备也得到了补充，有文化的岛民加入军队，能更快理解战术，加入工坊，能更快掌握技艺，以教兴岛，以文聚力，海祇的未来，充满了智慧的光芒。"
 SAN_event.6_option:"以教兴岛，以文聚力"

 # 07 海防工事触发事件
 SAN_event.7_title:"坚壁御敌"
 SAN_event.7_desc:"当坚固的海防要塞如珊瑚礁般，矗立在海祇岛的关键海岸，海祇岛的近海防御能力，便如铜墙铁壁般大幅提升。要塞上的弩箭直指鸣神海域，驱逐舰的防御效能也因工事的加持而强化，幕府水师的战船，只要靠近海岸线，便会被精准打击。站在要塞的城头，能清晰看到鸣神海域的每一处动静，能第一时间应对幕府的突袭，坚壁御敌，海祇的门户，从此牢不可破。"
 SAN_event.7_option:"筑牢海防，抵御来犯"

 # 08 渔业产业触发事件
 SAN_event.8_title:"渔兴百业旺"
 SAN_event.8_desc:"渔业产业的升级，如投入海面的火种，点燃了海祇岛的百业兴旺。加工设施的完善，让渔获能保存更久，成为军队的稳定口粮；存储体系的优化，让渔获的调配更高效，应对战时需求更从容；军用工厂的效率也随之提升，用鱼骨打造的箭矢更锋利，用渔帆缝制的营帐更坚韧，钢材等战略资源的产出也有所增加。以渔养战，以战护渔，渔业的优势转化为战争的潜力，海祇岛的反抗，便有了源源不断的支撑。"
 SAN_event.8_option:"以渔养战，以战护渔"

 # 09 医疗体系触发事件
 SAN_event.9_title:"疗愈之策"
 SAN_event.9_desc:"当疗愈寮舍如珊瑚般，遍布海祇岛的每一个村落，当草药的香气取代了伤病的哀嚎，医疗体系的完善，如为海祇岛撑起了一把守护生命的伞。军民的生存保障大幅提升，受伤的战士能快速得到救治，患病的岛民能及时得到医治，战争的伤亡大幅减少；战争支持度也随之上涨，岛民知道，珊瑚宫不仅能带领他们反抗，更能守护他们的生命；补给消耗也因伤病减少而降低，每一份物资，都能用到更关键的地方。"
 SAN_event.9_option:"广设寮舍，救治伤患"

 # 10 珊瑚同心触发事件
 SAN_event.10_title:"珊瑚同心，其利断金"
 SAN_event.10_desc:"当「珊瑚同心」成为海祇岛的国家精神，当这份信念融入每一个岛民的血脉，海祇岛的团结，便如一块完整的珊瑚，坚不可摧。渔家为军队送上最新鲜的渔获，农夫为军队奉上最饱满的稻穗，工匠为军队打造最锋利的刀枪，战士为岛民守护最安宁的家园。全岛的稳定度迎来大幅提升，不再有内部分歧，不再有相互猜忌，凝聚一心，共抗幕府，这份同心，便是海祇岛最强大的武器。"
 SAN_event.10_option:"凝聚一心，共抗幕府"

 # 11 反抗军征兵触发事件
 SAN_event.11_title:"应征从戎"
 SAN_event.11_desc:"当征兵令的钟声敲响在海祇岛的每一个村落，当反抗眼狩令的呼声传遍每一个街巷，大批有志之士如潮水般响应，应征从戎。年轻的渔郎放下渔网，拿起刀枪，誓要守护家人；年长的猎户放下弓箭，加入军队，誓要守护家园。人力储备得到了显著提升，反抗军的队伍快速壮大；战争支持度也同步高涨，每一个岛民都明白，参军不是送死，而是为了稻妻的自由，为了海祇的未来。"
 SAN_event.11_option:"扩充兵源，壮大声势"

 # 12 军队整编触发事件
 SAN_event.12_title:"整军经武"
 SAN_event.12_desc:"当分散的反抗武装，被整编为统一的队伍，当杂乱的口令，被替换为一致的指令，整军经武的工作，便如梳理珊瑚的脉络，让反抗军的战力大幅提升。陆军的经验显著提升，战士们历经统一训练，战术配合愈发默契；步兵装备的防御能力也随之增强，统一打造的铠甲更坚固，统一配备的盾牌更厚实。统一指挥，协同作战，反抗军不再是一盘散沙，而是一支能直面幕府铁蹄的精锐之师。"
 SAN_event.12_option:"统一指挥，协同作战"

 # 13 剑术训练触发事件
 SAN_event.13_title:"剑技精进"
 SAN_event.13_desc:"当岛中剑豪的身影，出现在反抗军的训练场，当严苛的剑术训练，成为每一个战士的日常，反抗军的剑技便如打磨后的珊瑚刀，愈发精进。步兵装备的攻击力大幅增长，每一次挥刀都能劈开幕府的重甲；陆军经验的获取也更快，新兵在实战中快速成长为老兵。勤练不辍，磨砺刀锋，反抗军的近战能力，已足以与幕府的武士正面抗衡，海祇的剑锋，终将斩断幕府的枷锁。"
 SAN_event.13_option:"勤练不辍，磨砺刀锋"

 # 14 枪阵编制触发事件
 SAN_event.14_title:"枪阵列列"
 SAN_event.14_desc:"当长枪如林，列阵于鸣神海域之滨，当战士们的脚步沉稳如礁，枪阵部队的组建，便如为反抗军筑起了一道钢铁的屏障。步兵装备的防御效能大幅增强，幕府骑兵的冲锋，撞在枪阵上便如撞在岩山上，寸步难进；陆军的组织度也有所增长，枪阵的进退如潮汐般有序，防守时固若金汤，进攻时锐不可当。结阵御敌，稳如泰山，反抗军终于有了应对幕府重甲的底气。"
 SAN_event.14_option:"结阵御敌，稳如泰山"

 # 15 弓箭手军团触发事件
 SAN_event.15_title:"弦响破风"
 SAN_event.15_desc:"当弓箭手军团的旗帜，飘扬在海祇岛的密林之上，当箭矢如飞鱼般，穿梭于林间潮间，反抗军的远程作战能力，便正式成型。大批的步兵装备得到补充，每一个弓手都有了趁手的弓箭；人力储备也进一步充实，视力佳、臂力足的岛民纷纷加入，成为精准的猎手。弯弓搭箭，制敌于远，幕府的军队，只要踏入海祇岛的范围，便会被弓手的箭矢盯上，无处可逃。"
 SAN_event.15_option:"弯弓搭箭，制敌于远"

 # 16 战船建造触发事件
 SAN_event.16_title:"舰行碧波"
 SAN_event.16_desc:"当新式战船的龙骨，在工匠的手中拼接完成，当船帆迎着鸣神海域的风扬起，战船建造的成果，便如海神的馈赠，展现在眼前。海军的经验大幅提升，工匠的造船技艺愈发精湛，战士的驾船技巧愈发娴熟；驱逐舰的攻击能力也得到强化，火炮的射程更远，精度更高。打造战船，经略海洋，海祇岛争夺制海权的脚步，终于迈出了最坚实的一步，鸣神海域的波涛，即将因海祇的战船而翻涌。"
 SAN_event.16_option:"打造战船，经略海洋"

 # 17 近海巡逻触发事件
 SAN_event.17_title:"海疆巡守"
 SAN_event.17_desc:"当巡逻战船的帆影，日夜穿梭于海祇岛的海岸线，当战士的目光，如鹰隼般扫视着鸣神海域的每一处，近海巡逻机制的建立，便如为海祇岛披上了一层守护的铠甲。幕府水师不敢再轻易袭扰，生怕被巡逻队发现并打击；海军的整体防御能力大幅提升，应对突袭的反应更快；对幕府的情报掌握也更充分，能第一时间知晓其水师的动向。日夜巡防，守护海疆，海祇的门户，永远安宁。"
 SAN_event.17_option:"日夜巡防，守护海疆"

 # 18 伏击战术触发事件
 SAN_event.18_title:"设伏待敌"
 SAN_event.18_desc:"当反抗军的战士，如珊瑚般隐藏在密林之中，当伏击的战术，如潮汐的规律般被熟练运用，海祇岛的地形优势，便转化为了最致命的武器。反抗军师团的夜战能力大幅提升，能在黑暗中精准出击，打幕府军队一个措手不及；陆军的组织度也随之增长，战术的执行更高效，设伏、突袭、撤退，一气呵成。利用地利，出奇制胜，幕府军队踏入海祇岛的那一刻，便已踏入了预设的陷阱，处处碰壁，步步维艰。"
 SAN_event.18_option:"利用地利，出奇制胜"

 # 19 后勤体系触发事件
 SAN_event.19_title:"粮草先行"
 SAN_event.19_desc:"当统一的粮仓如珊瑚堡般建立，当便捷的运输路线如洋流般畅通，后勤体系的完善，便如为反抗军注入了源源不断的活力。补给消耗大幅降低，每一份粮食、每一件军械，都能精准送到前线战士的手中；建筑建造速度也因物资调配高效而提升，破损的要塞快速修复，新的兵营快速建起。优化补给，保障军需，反抗军的持续作战能力大幅增强，即便是长期与幕府周旋，也不再有缺粮少械之虞。"
 SAN_event.19_option:"优化补给，保障军需"

 # 20 珊瑚宫近卫触发事件
 SAN_event.20_title:"近卫戍庭"
 SAN_event.21_title:"智略传世"
 SAN_event.21_desc:"当心海编撰的兵法，如海神的典籍，在反抗军内广为流传，海祇岛的智略，便如洋流般，浸润每一个战士的心田。兵法中记录的海战技巧，让战船的调度更精准；总结的陆战经验，让军队的冲锋更有序；梳理的治理心得，让海岛的运转更高效。全领域的研究效率大幅提升，从前难解的战术，如今一看便懂；作战规划速度也随之加快，每一个布局都能快速落地。研习兵法，以智取胜，心海的智略，终将引领海祇走向胜利。"
 SAN_event.21_option:"研习兵法，以智取胜"

 # 22 战争规划触发事件
 SAN_event.22_title:"运筹帷幄"
 SAN_event.22_desc:"当珊瑚宫的灯火，彻夜照亮心海规划战局的身影，当一份份精准的作战计划，从珊瑚宫传至前线，心海亲自主持的战争规划，便如海神的指引，精准而致命。作战规划的速度大幅提升，从分析战局到制定战术，一气呵成；对幕府的情报掌握度也显著增强，幕府的每一个动向，都逃不过心海的眼睛。精密布局，步步为营，反抗军的每一次进攻，都能直击幕府的软肋，每一次防守，都能筑牢自身的防线。"
 SAN_event.22_option:"精密布局，步步为营"

 # 23 情报网络触发事件
 SAN_event.23_title:"千里眼，顺风耳"
 SAN_event.23_desc:"当情报网络的触手，如珊瑚的枝丫般，遍布稻妻的每一个角落，海祇岛便如拥有了海神的千里眼、顺风耳。稻妻城的幕府决策，踏鞴砂的军械制造，鸣神岛的军队调动，皆尽收眼底；同时，假情报的散布，让幕府将领疑心重重，错判战局，敌方的组织度大幅削弱。织密情报网，掌控主动权，反抗军永远知道幕府的下一步动作，永远能提前布局，占据先机。"
 SAN_event.23_option:"织密情报网，掌控主动权"

 # 24 反抗眼狩令触发事件
 SAN_event.24_title:"反戈一击"
 SAN_event.24_desc:"当反抗眼狩令的旗帜，插遍稻妻的每一个城镇，当受压迫的民众，如潮水般响应反抗的号召，这场全民运动，便如雷霆般，向幕府发起了反戈一击。战争支持度暴涨，每一个被眼狩令伤害的民众，都愿加入反抗军，都愿为自由而战；心海的领袖声望也达到新高度，成为反抗眼狩令的精神旗帜，每一个稻妻人都知道，跟着心海，便能推翻苛政，重获自由。"
 SAN_event.24_option:"揭竿而起，反抗苛政"

 # 25 反幕府宣传触发事件
 SAN_event.25_title:"檄文传四海"
 SAN_event.25_desc:"当反幕府的檄文，贴满稻妻的每一面墙壁，当控诉暴政的歌谣，唱遍稻妻的每一条街巷，反幕府的宣传，便如海浪般，席卷了整个稻妻。世界对稻妻暴政的关注大幅提升，幕府的舆论优势荡然无存，提瓦特各国都看清了幕府的真面目；反抗军的战意愈发高涨，每一个战士都明白，他们的战斗，是正义的抗争，是为了全稻妻的自由。广而告之，唤醒民心，幕府的统治，已摇摇欲坠。"
 SAN_event.25_option:"广而告之，唤醒民心"

 # 26 心理作战触发事件
 SAN_event.26_title:"攻心为上"
 SAN_event.26_desc:"当假情报如海风般，吹进幕府军队的营地，当恐慌的氛围如潮水般，笼罩幕府士卒的心头，心理作战的升级，便如无形的利刃，瓦解着幕府的战斗意志。敌方的组织度大幅下降，军队的调度混乱不堪，将领不信任士兵，士兵怀疑将领；反抗军的战争支持度却持续攀升，士气如虹。瓦解敌志，不战屈人，心海的攻心之策，正在让胜利的天平，向海祇岛倾斜。"
 SAN_event.26_option:"瓦解敌志，不战屈人"

 # 27 结盟准备触发事件
 SAN_event.27_title:"远交近攻"
 SAN_event.27_desc:"当外交使者的航船，载着海祇岛的诚意，驶向提瓦特的各个国家，当外交点数如珊瑚般，快速积累，结盟准备工作的完成，便如为海祇岛打开了对外的大门。国家的稳定度因外部环境改善而提升，幕府的孤立无援，让反抗的道路更顺畅；充足的外交点数，也为与璃月、蒙德等国结盟，打下了坚实的基础。广结盟友，共抗幕府，海祇岛的反抗，不再是孤军奋战。"
 SAN_event.27_option:"广结盟友，共抗幕府"

 # 28 璃月外交触发事件
 SAN_event.28_title:"璃月之援"
 SAN_event.28_desc:"当璃月港的航船，载着钢材与工匠，驶入海祇岛的港口，当「璃月之盟」的盟约，在珊瑚宫前正式缔结，海祇岛便迎来了最坚实的外援。「璃月之盟」国家精神激活，璃月的先进技艺，让钢材等战略资源的产出大幅提升；璃月的充足物资，让反抗军的装备愈发精良。借力璃月，补强短板，海祇岛的战力，如虎添翼，反抗的胜利，又近了一步。"
 SAN_event.28_option:"借力璃月，补强短板"

 # 29 蒙德友好触发事件
 SAN_event.29_title:"自由之谊"
 SAN_event.29_desc:"当蒙德的风，吹过海祇岛的珊瑚林，当自由的理念，与反抗的初心相融，与蒙德建立的友好关系，便如为海祇岛带来了新的希望。国家的稳定度大幅提升，蒙德的国际声望，让幕府不敢轻易对海祇岛施压；航空领域的研究也因技术交流而加快，反抗军的侦查飞艇能飞得更远，运输热气球能载得更多。携手蒙德，共求自由，稻妻的自由之路，便多了一份助力，多了一份光明。"
 SAN_event.29_option:"携手蒙德，共求自由"

 # 30 心海领导触发事件
 SAN_event.30_title:"海祇之主"
 SAN_event.30_desc:"珊瑚宫的涛声漫过海祇岛的每一寸礁岩，八重神子的权柄未曾抵达的海域，终由心海执掌乾坤。自海祇大御神沉睡后，这位以智略名动稻妻的军师，终于以无懈可击的筹谋与悲悯众生的胸怀，赢得了全岛子民的绝对归心。无论是与幕府对峙的危局，还是岛内政令的擘画，心海的每一次决策都如潮汐般精准，如珊瑚般坚韧。当「心海的智略」这一镌刻着海祇意志的国家精神被唤醒，她的领袖声望如涨潮的海水般升至顶峰——不是凭借武力的威压，而是以智破局、以仁服人的智慧，让反抗军的旗帜在海风中猎猎作响，也让海祇岛的未来，锚定在这位「海祇之主」的掌心里。"
 SAN_event.30_option:"奉心海为主，引领反抗路"

 # 31 最终备战触发事件
 SAN_event.31_title:"临战之誓"
 SAN_event.31_desc:"鸣神岛的雷暴隐隐掠过海平线，幕府的铁蹄声已近在耳畔，心海立于珊瑚宫的最高处，以海祇大御神之名，向全岛发布最终决战的战备动员令。文书传至每一处渔村、每一座哨塔，原本散落的反抗力量如归海的游鱼，瞬间凝聚成无坚不摧的洪流。老妪为子弟磨亮长刀，渔人将渔船改作战艇，就连稚童也学着包扎伤口、传递讯息——全岛上下同仇敌忾，恨幕府之苛政，惜稻妻之破碎，愿以血肉守护海祇的自由。战争支持度如炽烈的焰火燃至顶点，人力储备亦因全民的赤诚尽数充盈，此刻的海祇岛，已不是孤岛，而是一柄对准幕府咽喉的利刃，只待出鞘，便要划破稻妻的黑暗。"
 SAN_event.31_option:"全民皆兵，迎战幕府"

 # 32 突破封锁触发事件
 SAN_event.32_desc:"幕府以「眼狩令」为刃，以水师为墙，将海祇岛困于茫茫沧海，妄图断绝粮秣、困死反抗的火种。但心海早算准幕府水师的布防疏漏，选在月隐潮升之夜，率精锐突袭海上封锁线。反抗军的战船如鲛鲨般穿梭，长刀劈开浪涛，箭矢穿透夜幕，幕府的战船或沉或降，封锁线竟在一夜之间土崩瓦解。此役大捷，不仅让海祇岛重获海上通路，更让步兵的士气如朝阳升腾——每一把长刀都淬了海风的锐气，每一套甲胄都凝了必胜的信念，步兵装备的整体攻击力大幅提升，陆军组织度亦如拧紧的缆绳，坚不可摧。海祇的风，终于吹向了更远的海域。"
 SAN_event.32_option:"奋勇突击，打通海路"

 # 33 制海权触发事件
 SAN_event.33_title:"制霸海域"
 SAN_event.33_desc:"稻妻近海的浪涛，本是幕府水师的天下，鸣神的雷暴曾庇佑着他们的战船横行。但海祇的儿女，生于海、长于海，对潮汐的理解，远胜幕府那些仰仗雷霆的武士。心海以「水神之术」推演洋流，以「海祇兵法」排布战船，与幕府水师在鸣神湾外展开决战。浪涛为盾，海风为刃，反抗军的战船如游龙般绕开幕府的雷炮，登船战的武士以鱼叉破甲，以短刀制敌，终将幕府水师的旗舰击沉于深海。此战过后，稻妻近海的制海权尽归海祇，海军的每一次划桨都带着征服的底气，整体攻击力大幅提升，海战的经验如层层叠叠的珊瑚，在每一位水兵的心中生长，从此，海祇的战船所至，皆是无人敢挡的海域。"
 SAN_event.33_option:"掌控海洋，掌控战局"

 # 34 攻占港口触发事件
 SAN_event.34_title:"港破城摧"
 SAN_event.34_desc:"那座由幕府牢牢掌控的港口，本是扼守稻妻东西海域的咽喉，囤积着幕府的军械与粮草，也困住了海祇岛进攻本岛的脚步。心海定下「围三阙一」之计，先以水师断其海路增援，再以陆军猛攻城门，反抗军的喊杀声盖过了港口的潮声，长刀劈开幕府士兵的甲胄，云梯架上高耸的城墙，不过半日，港口的旗帜便由「天领奉行」换成了珊瑚宫的纹章。攻占此港，不仅让陆军将士经此一役积累了海量实战经验，更缴获了大批幕府的步兵装备——刀、枪、甲胄堆满了仓库，后勤的支点就此建立，海祇的大军，终于有了踏足本岛的根基，而幕府的防线，也从此撕开了一道无法弥补的缺口。"
 SAN_event.34_option:"乘胜追击，夺取要地"

 # 35 前进基地触发事件
 SAN_event.35_title:"前哨立，大业兴"
 SAN_event.35_desc:"在攻占的港口旁，反抗军的工兵们迎着海风搭建营寨，砍伐坚木为栅，挖掘壕沟为防，一座前进作战基地如珊瑚般从海滩上「生长」出来。这不是简单的营地，而是心海为进攻鸣神本岛布下的关键一子——码头可停靠更多战船，军械库能囤积更多弹药，练兵场可磨砺更多将士。基地立稳的那一刻，海军将士终于有了固定的休整与训练之地，海战经验如潮水般大幅提升；巡洋舰的炮口经工匠调校，炮身裹上海祇的咒术，攻击能力更胜往昔。海风掠过基地的望楼，心海立于楼上，望着鸣神岛的方向，知道进攻本岛的根基已固，稻妻的黎明，就藏在这前哨的灯火里。"
 SAN_event.35_option:"筑牢基地，剑指本岛"

 # 36 决战触发事件
 SAN_event.36_title:"终局之战"
 SAN_event.36_desc:"当前进基地的战鼓擂响，当海祇的战船铺满鸣神湾，对幕府核心区域的总攻，终于在万众期待中打响。心海的军令传至每一支队伍：「破幕府，废眼狩，还稻妻以自由」。反抗军的士兵们踩着浪涛登岸，长刀砍向幕府的武士，弓箭射向天领奉行的旗帜，海祇岛的子民们在后方呐喊助威，就连沉睡的海祇大御神，也似以潮汐之力护佑着自己的子民。这一刻，全岛的战争支持度达到了前所未有的高度——无人退缩，无人动摇，每一个人都知道，此战若胜，稻妻便有新生；此战若败，海祇便无归途。陆军组织度亦因万众一心而臻至顶峰，刀光与雷光碰撞，海风与呐喊交织，终局之战，便是稻妻命运的抉择。"
 SAN_event.36_option:"背水一战，定鼎稻妻"

 # 37 珊瑚胜利触发事件
 SAN_event.37_title:"珊瑚凯歌"
 SAN_event.37_desc:"鸣神岛的雷暴终于消散，幕府主力的旗帜倒在天守阁前，反抗军的长刀高高举起，海祇的儿女们迎着海风欢呼——这场持续数月的战争，终以海祇的胜利落下帷幕。当幕府的降书送至珊瑚宫，当「眼狩令」的卷轴被付之一炬，「珊瑚的胜利」这一镌刻着海祇荣光的国家精神，终于在稻妻的土地上激活。胜利的喜悦如潮水般漫过每一座岛屿，曾经因战争而动荡的民心，此刻尽数归安，国家稳定度大幅提升。心海立于珊瑚宫的露台，望着海面的霞光，知道这场胜利不是结束，而是稻妻新生的开始——珊瑚的凯歌，不仅唱给战死的英灵，更唱给每一个渴望自由的稻妻子民。"
 SAN_event.37_option:"欢庆胜利，休养生息"

 # 38 重建稻妻触发事件
 SAN_event.38_title:"百废俱兴"
 SAN_event.38_desc:"战争的硝烟散尽，稻妻的土地上满是疮痍：天领奉行的营寨沦为废墟，鸣神岛的民房半数倾颓，就连珊瑚宫的码头，也因战火而破损不堪。心海与稻妻的有识之士们定下「重建之策」，战后重建的号角就此吹响。工匠们修补城墙，农夫们重耕田地，渔民们修复渔船，就连曾经的幕府士兵，也放下长刀，参与到重建之中。全民的参与让稻妻的重建速度远超预期：主城的民用工厂一座座拔地而起，织布机的声响、打铁铺的火光，重新点亮了稻妻的街巷；建筑建造的进度一日千里，倾颓的房屋重立，破损的桥梁复通。百废俱兴，不是一句空话，而是稻妻子民用双手，在战争的废墟上，重新搭建起的家园。"
 SAN_event.38_option:"重建家园，恢复生机"

 # 39 新秩序触发事件
 SAN_event.39_title:"稻妻新生"
 SAN_event.39_desc:"当重建的炊烟漫过稻妻的每一座岛屿，当战争的伤痛渐渐愈合，心海与稻妻各岛的领袖们齐聚珊瑚宫，商议稻妻的未来。他们摒弃了幕府「雷霆独断」的旧规，定下「以民为本，以海为基」的新秩序：废除眼狩令，归还神之眼；轻徭薄赋，休养生息；各岛自治，共商国是。新的秩序规则如和煦的海风，吹遍稻妻的每一寸土地，曾经因高压统治而紧绷的民心，终于彻底松弛。「胜利的荣光」如一层温暖的屏障，笼罩着整个稻妻，国家稳定度迎来历史性的提升——不再是靠雷霆威压的表面平静，而是子民发自内心的认同与归依。稻妻的新生，便在这新秩序的根基上，缓缓展开。"
 SAN_event.39_option:"制定新规，开启新篇"

 # 40 海神时代触发事件
 SAN_event.40_title:"海神纪元"
 SAN_event.40_desc:"当新秩序的钟声在珊瑚宫敲响，当稻妻的子民们终于过上无战无苛的日子，「海神纪元」便在万众的期盼中正式开启。这不是某一个人的胜利，而是海祇的信仰、稻妻的自由，共同铸就的时代——以海祇大御神的庇佑为根基，以心海的智略为指引，以全体子民的努力为阶梯。同名的「海神时代」国家精神激活的那一刻，稻妻的土地仿佛被注入了新的生命力：人力储备因人口的繁衍与归聚而暴增，曾经因战争而荒芜的农田，如今稻浪翻滚，粮食产出节节攀升；渔业、盐业、造船业尽数复苏，各类资源的产出如涨潮般爆发式增长。海祇的涛声，从此不再是战争的号角，而是稻妻繁荣的乐章，以海立邦，光耀四方，海神纪元的稻妻，终将成为提瓦特海上最耀眼的明珠。"
 SAN_event.40_option:"以海立邦，光耀稻妻"